<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>💥 粒子效果实验室</title>
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@7.3.2/dist/pixi.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pixi-particles@4.3.1/dist/pixi-particles.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a12;
      color: #eee;
      font-family: -apple-system, 'PingFang SC', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .header {
      text-align: center;
      padding: 20px;
      position: relative;
      z-index: 10;
    }
    .header h1 {
      font-size: 24px;
      font-weight: 900;
      background: linear-gradient(135deg, #FF6B35, #FFD700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header p { color: #888; font-size: 13px; margin-top: 6px; }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      padding: 10px 20px;
      position: relative;
      z-index: 10;
    }
    .ctrl-btn {
      padding: 8px 14px;
      border: 1px solid #444;
      border-radius: 20px;
      background: #1a1a2e;
      color: #ddd;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 600;
    }
    .ctrl-btn:hover, .ctrl-btn.active {
      border-color: #FF6B35;
      background: #FF6B3522;
      color: #FF6B35;
    }
    .ctrl-btn .num {
      display: inline-block;
      width: 18px; height: 18px;
      line-height: 18px;
      text-align: center;
      background: #FF6B35;
      color: #000;
      border-radius: 50%;
      font-size: 10px;
      margin-right: 4px;
    }
    #pixi-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }
    .hint {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: #555;
      font-size: 13px;
      z-index: 10;
      pointer-events: none;
    }
    .back-link {
      position: fixed;
      top: 20px; left: 20px;
      z-index: 100;
      color: #888;
      text-decoration: none;
      font-size: 14px;
      padding: 8px 16px;
      border: 1px solid #333;
      border-radius: 20px;
      background: #1a1a2e;
    }
    .back-link:hover { color: #FF6B35; border-color: #FF6B35; }
    .effect-name {
      position: fixed;
      top: 20px; right: 20px;
      z-index: 100;
      background: #1a1a2eee;
      padding: 8px 16px;
      border-radius: 12px;
      border: 1px solid #333;
      font-size: 14px;
      font-weight: 700;
      color: #FFD700;
    }
    .auto-toggle {
      position: fixed;
      bottom: 65px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      padding: 8px 20px;
      background: #1a1a2e;
      border: 1px solid #444;
      border-radius: 25px;
      color: #ddd;
      font-size: 12px;
      cursor: pointer;
      font-weight: 600;
    }
    .auto-toggle:hover { border-color: #FFD700; color: #FFD700; }
    .badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 8px;
      font-size: 9px;
      margin-left: 4px;
      background: #FF6B3533;
      color: #FF6B35;
    }
    .status-bar {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      background: #1a1a2ecc;
      padding: 6px 16px;
      border-radius: 12px;
      border: 1px solid #333;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← 返回导航</a>
  <div class="effect-name" id="effectName">加载中...</div>

  <div class="header">
    <h1>💥 粒子效果实验室</h1>
    <p>基于 @pixi/particle 官方配置 · 点击屏幕触发</p>
  </div>

  <div class="controls" id="controls"></div>

  <div class="auto-toggle" id="autoBtn" onclick="toggleAuto()">🎯 自动演示: 开</div>
  <div class="hint">👆 点击屏幕任意位置触发爆炸</div>
  <div id="pixi-container"></div>

  <script src="particle-presets.js"></script>
  <script>
    // === 初始化 PixiJS ===
    var W = window.innerWidth, H = window.innerHeight;
    var SCALE = Math.min(W, H) / 800;
    var app = new PIXI.Application({
      width: W, height: H,
      resolution: window.devicePixelRatio || 1,
      autoDensity: true,
      backgroundAlpha: 0, antialias: true
    });
    document.getElementById('pixi-container').appendChild(app.view);

    var currentPreset = 'explosion_fireball';
    var autoDemo = true;
    var autoTimer = 0;
    var activeEmitters = [];

    // 生成按钮
    var presetList = [
      { key: 'explosion_fireball', label: '火球爆炸', tag: '爆炸' },
      { key: 'explosion_shockwave', label: '冲击波', tag: '爆炸' },
      { key: 'explosion_debris', label: '碎片爆散', tag: '爆炸' },
      { key: 'explosion_nuke', label: '核爆蘑菇云', tag: '爆炸' },
      { key: 'magic_fire', label: '火焰喷射', tag: '魔法' },
      { key: 'magic_ice', label: '冰霜爆裂', tag: '魔法' },
      { key: 'magic_electric', label: '电光爆炸', tag: '魔法' },
      { key: 'magic_rainbow', label: '七彩星爆', tag: '魔法' },
      { key: 'magic_smoke', label: '浓烟', tag: '效果' },
      { key: 'magic_sparks', label: '火花散射', tag: '效果' },
      { key: 'ambient_snow', label: '飘雪', tag: '环境' },
      { key: 'ambient_rain', label: '下雨', tag: '环境' }
    ];

    var controlsDiv = document.getElementById('controls');
    presetList.forEach(function(p, i) {
      var btn = document.createElement('button');
      btn.className = 'ctrl-btn' + (p.key === currentPreset ? ' active' : '');
      btn.innerHTML = '<span class="num">' + (i + 1) + '</span>' + p.label +
                      '<span class="badge">' + p.tag + '</span>';
      btn.onclick = function() { setPreset(p.key); };
      controlsDiv.appendChild(btn);
    });

    // 创建粒子纹理
    var particleTextures = {};
    function makeTex(r, g, b, soft) {
      var c = document.createElement('canvas');
      var size = Math.round(32 + (soft || 0.15) * 32);
      c.width = size; c.height = size;
      var ctx = c.getContext('2d');
      var half = size / 2;
      var s = soft || 0.15;
      var grad = ctx.createRadialGradient(half, half, 0, half, half, half);
      grad.addColorStop(0, 'rgba(255,255,255,1)');
      grad.addColorStop(s * 0.5, 'rgba(' + r + ',' + g + ',' + b + ',0.95)');
      grad.addColorStop(Math.min(0.6, s * 2), 'rgba(' + r + ',' + g + ',' + b + ',0.3)');
      grad.addColorStop(1, 'rgba(' + r + ',' + g + ',' + b + ',0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, size, size);
      return PIXI.Texture.from(c);
    }

    // 常用纹理
    var texDefault = makeTex(255, 200, 100, 0.15);
    var texSpark = makeTex(255, 255, 200, 0.05);
    var texSmoke = makeTex(100, 100, 100, 0.5);

    function setPreset(key) {
      currentPreset = key;
      var btns = document.querySelectorAll('.ctrl-btn');
      for (var i = 0; i < btns.length; i++) {
        btns[i].classList.toggle('active', i === presetList.findIndex(function(p) { return p.key === key; }));
      }
      // 更新标题
      var name = presetList.find(function(p) { return p.key === key; });
      document.getElementById('effectName').textContent = (name ? name.label : key) +
        ' | ' + PRESET_CATEGORIES[key] ? '' : '';

      // 显示分类
      for (var cat in PRESET_CATEGORIES) {
        if (PRESET_CATEGORIES[cat].indexOf(key) >= 0) {
          document.getElementById('effectName').textContent += ' [' + cat + ']';
          break;
        }
      }
    }

    // 触发爆炸
    function triggerExplosion(x, y) {
      var config = PARTICLE_PRESETS[currentPreset];
      if (!config) return;

      // 深拷贝配置
      var cfg = JSON.parse(JSON.stringify(config));

      // 选择纹理
      var tex;
      if (currentPreset.indexOf('smoke') >= 0) {
        tex = texSmoke;
      } else if (currentPreset.indexOf('snow') >= 0 || currentPreset.indexOf('rain') >= 0) {
        tex = texSpark;
      } else {
        tex = texDefault;
      }

      // v4: new Emitter(parent, particleImages, config)
      var emitter = new PIXI.particles.Emitter(app.stage, [tex], {
        lifetime: cfg.lifetime,
        frequency: cfg.frequency,
        emitterLifetime: cfg.emitterLifetime,
        maxParticles: cfg.maxParticles,
        pos: { x: x, y: y },
        behaviors: cfg.behaviors
      });

      emitter.emit = true;
      activeEmitters.push(emitter);

      // 自动清理
      var cleanupTime = (cfg.emitterLifetime + cfg.lifetime.max) * 1000 + 500;
      setTimeout(function() {
        emitter.destroy();
        var idx = activeEmitters.indexOf(emitter);
        if (idx >= 0) activeEmitters.splice(idx, 1);
      }, cleanupTime);
    }

    // 点击触发
    app.view.addEventListener('pointerdown', function(e) {
      triggerExplosion(e.global.x, e.global.y);
    });

    // 自动演示
    function toggleAuto() {
      autoDemo = !autoDemo;
      document.getElementById('autoBtn').textContent = autoDemo ? '🎯 自动演示: 开' : '🎯 自动演示: 关';
    }

    // 自动演示逻辑（在 ticker 中调用）
    app.ticker.add(function(delta) {
      var dt = delta / 60;
      for (var i = activeEmitters.length - 1; i >= 0; i--) {
        activeEmitters[i].update(dt);
      }
      if (autoDemo) {
        autoTimer += dt;
        if (autoTimer > 0.8) {
          autoTimer = 0;
          var cx = W * 0.2 + Math.random() * W * 0.6;
          var cy = H * 0.2 + Math.random() * H * 0.5;
          triggerExplosion(cx, cy);
        }
      }
    });

    // resize
    window.addEventListener('resize', function() {
      W = window.innerWidth; H = window.innerHeight;
      SCALE = Math.min(W, H) / 800;
      app.renderer.resize(W, H);
    });

    setPreset('explosion_fireball');
  </script>
</body>
</html>
