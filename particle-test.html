// 预设分类索引（供 AI 自动选择）
var PRESET_CATEGORIES = {
  "explosion": ["explosion_fireball", "explosion_shockwave", "explosion_debris", "explosion_nuke"],
  "magic":    ["magic_fire", "magic_ice", "magic_electric", "magic_rainbow"],
  "ambient":  ["ambient_snow", "ambient_rain"],
  "effect":   ["magic_smoke", "magic_sparks"]
};

// AI 自动选择：根据新闻情绪选择爆炸类型
function selectExplosionPreset(emotion) {
  var map = {
    "tension":    "explosion_fireball",
    "anger":      "explosion_nuke",
    "fear":       "explosion_shockwave",
    "joy":        "magic_rainbow",
    "sadness":    "magic_ice",
    "surprise":   "magic_electric",
    "default":    "explosion_fireball"
  };
  return map[emotion] || map.default;
}

// === 核心发射函数 ===
function emitPreset(x, y, presetName, ctx) {
  var preset = PARTICLE_PRESETS[presetName];
  if (!preset) return;
  var S = ctx.SCALE;
  var app = ctx.app;
  if (!app) return;

  // 纹理缓存
  if (!ctx._texCache) ctx._texCache = {};
  if (!ctx._effects) ctx._effects = [];
  if (!ctx._particles) ctx._particles = [];

  function getTex(r, g, b, sharpness) {
    var key = r + '_' + g + '_' + b + '_' + (sharpness || 0.15);
    if (!ctx._texCache[key]) {
      var c = document.createElement('canvas');
      // 增大纹理基础尺寸
      var size = Math.round(48 + (sharpness || 0.15) * 48);
      c.width = size; c.height = size;
      var tctx = c.getContext('2d');
      var half = size / 2;
      var s = sharpness || 0.15;
      var grad = tctx.createRadialGradient(half, half, 0, half, half, half);
      grad.addColorStop(0, 'rgba(255,255,255,1)');
      grad.addColorStop(s * 0.5, 'rgba(' + r + ',' + g + ',' + b + ',0.95)');
      grad.addColorStop(Math.min(0.6, s * 2), 'rgba(' + r + ',' + g + ',' + b + ',0.3)');
      grad.addColorStop(1, 'rgba(' + r + ',' + g + ',' + b + ',0)');
      tctx.fillStyle = grad;
      tctx.fillRect(0, 0, size, size);
      ctx._texCache[key] = PIXI.Texture.from(c);
    }
    return ctx._texCache[key];
  }

  function hexRgb(hex) {
    return { r: (hex >> 16) & 0xFF, g: (hex >> 8) & 0xFF, b: hex & 0xFF };
  }

  // 1. 闪光
  if (preset.flash) {
    var f = preset.flash;
    var flash = new PIXI.Graphics();
    flash.beginFill(f.color);
    if (f.isFull) {
      flash.drawRect(0, 0, app.screen.width, app.screen.height);
    } else {
      flash.drawCircle(x, y, f.size * S);
    }
    flash.alpha = f.alpha;
    app.stage.addChild(flash);
    setTimeout(function() { if (flash.parent) flash.parent.removeChild(flash); flash.destroy(); }, f.duration);
  }

  // 2. 火球
  preset.fireballs.forEach(function(fb) {
    setTimeout(function() {
      var fbObj = {
        x: x, y: y + (fb.yOffset || 0), r: 3 * S,
        maxR: fb.maxR * S, color: fb.color,
        life: fb.life, maxLife: fb.life,
        g: new PIXI.Graphics()
      };
      app.stage.addChild(fbObj.g);
      ctx._effects.push(fbObj);
    }, fb.delay);
  });

  // 3. 冲击波
  preset.rings.forEach(function(r) {
    setTimeout(function() {
      var ringObj = {
        x: x, y: y, r: 3 * S,
        maxR: r.maxR * S, color: r.color, lineWidth: r.lineWidth,
        life: r.life, maxLife: r.life,
        g: new PIXI.Graphics()
      };
      app.stage.addChild(ringObj.g);
      ctx._effects.push(ringObj);
    }, r.delay);
  });

  // 4. 闪电
  if (preset.lightning) {
    var lg = preset.lightning;
    for (var i = 0; i < lg.count; i++) {
      var dx = (Math.random() - 0.5) * lg.maxLength * S;
      var dy = (Math.random() - 0.5) * lg.maxLength * S;
      var life = lg.life.min + Math.random() * (lg.life.max - lg.life.min);
      var g = new PIXI.Graphics();
      g.lineStyle(lg.lineWidth * S, lg.color, 0.9);
      var steps = lg.steps || 8;
      var cx = x, cy = y;
      g.moveTo(cx, cy);
      for (var j = 1; j <= steps; j++) {
        var t = j / steps;
        cx = x + dx * t + (Math.random() - 0.5) * 20 * S;
        cy = y + dy * t + (Math.random() - 0.5) * 20 * S;
        g.lineTo(cx, cy);
      }
      app.stage.addChild(g);
      setTimeout(function() { if (g.parent) g.parent.removeChild(g); g.destroy(); }, life * 1000);
    }
  }

  // 5. 普通粒子
  preset.particles.forEach(function(pc) {
    setTimeout(function() {
      for (var i = 0; i < pc.count; i++) {
        var a, sp, sx, sy;
        if (pc.directionCone) {
          a = pc.directionCone.angle + (Math.random() - 0.5) * pc.directionCone.spread;
        } else {
          a = Math.random() * Math.PI * 2;
        }
        sp = (pc.speed.min + Math.random() * (pc.speed.max - pc.speed.min)) * S;
        var off = (pc.launchOffset || 5) * S;
        sx = x + Math.cos(a) * off;
        sy = y + Math.sin(a) * off;

        var col = pc.colors[Math.floor(Math.random() * pc.colors.length)];
        var c = hexRgb(col);
        var tex = getTex(c.r, c.g, c.b, pc.texSharpness || 0.15);
        var life = pc.life.min + Math.random() * (pc.life.max - pc.life.min);
        var size = pc.size.min + Math.random() * (pc.size.max - pc.size.min);
        var bm = pc.blendMode === 'normal' ? PIXI.BLEND_MODES.NORMAL : PIXI.BLEND_MODES.ADD;

        var sprite = new PIXI.Sprite(tex);
        sprite.anchor.set(0.5);
        sprite.x = sx; sprite.y = sy;
        sprite.blendMode = bm;
        app.stage.addChild(sprite);

        ctx._particles.push({
          sprite: sprite, x: sx, y: sy,
          vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
          life: life, maxLife: life, size: size,
          gravity: pc.gravity || 0.15,
          rotation: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - 0.5) * 10
        });
      }
    }, pc.delay || 0);
  });

  // 6. 星爆
  if (preset.starburst) {
    var sb = preset.starburst;
    setTimeout(function() {
      for (var ci = 0; ci < sb.colors.length; ci++) {
        var baseA = (ci / sb.colors.length) * Math.PI * 2;
        var col = sb.colors[ci];
        var c = hexRgb(col);
        var tex = getTex(c.r, c.g, c.b, sb.texSharpness || 0.1);
        for (var i = 0; i < sb.particlesPerColor; i++) {
          var a = baseA + (Math.random() - 0.5) * sb.spread;
          var sp = (sb.speed.min + Math.random() * (sb.speed.max - sb.speed.min)) * S;
          var life = sb.life.min + Math.random() * (sb.life.max - sb.life.min);
          var size = sb.size.min + Math.random() * (sb.size.max - sb.size.min);
          var sprite = new PIXI.Sprite(tex);
          sprite.anchor.set(0.5);
          sprite.x = x; sprite.y = y;
          sprite.blendMode = PIXI.BLEND_MODES.ADD;
          app.stage.addChild(sprite);
          ctx._particles.push({
            sprite: sprite, x: x, y: y,
            vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
            life: life, maxLife: life, size: size,
            gravity: 0.1,
            rotation: 0, rotSpeed: 0
          });
        }
      }
    }, sb.delay || 0);
  }

  // 7. 尾迹/环境粒子 (循环发射)
  preset.trails.forEach(function(tc) {
    // 环境粒子持续发射
    if (tc.spawnRect) {
      var sr = tc.spawnRect;
      for (var i = 0; i < tc.count; i++) {
        var sx = x + sr.x * S + Math.random() * sr.w * S;
        var sy = y + sr.y * S + Math.random() * sr.h * S;
        var col = tc.colors[Math.floor(Math.random() * tc.colors.length)];
        var c = hexRgb(col);
        var tex = getTex(c.r, c.g, c.b, tc.texSharpness || 0.15);
        var life = tc.life.min + Math.random() * (tc.life.max - tc.life.min);
        var size = tc.size.min + Math.random() * (tc.size.max - tc.size.min);
        var sp = (tc.speed.min + Math.random() * (tc.speed.max - tc.speed.min)) * S;
        var bm = tc.blendMode === 'normal' ? PIXI.BLEND_MODES.NORMAL : PIXI.BLEND_MODES.ADD;
        var sprite = new PIXI.Sprite(tex);
        sprite.anchor.set(0.5);
        sprite.x = sx; sprite.y = sy;
        sprite.blendMode = bm;
        app.stage.addChild(sprite);
        ctx._particles.push({
          sprite: sprite, x: sx, y: sy,
          vx: Math.random() * sp * 2 - sp, vy: sp * 0.5,
          life: life, maxLife: life, size: size,
          gravity: tc.gravity || 0.1,
          rotation: 0, rotSpeed: 0
        });
      }
    } else {
      // 一次性尾迹
      setTimeout(function() {
        for (var i = 0; i < tc.count; i++) {
          var a = Math.random() * Math.PI * 2;
          var sp = (tc.speed.min + Math.random() * (tc.speed.max - tc.speed.min)) * S;
          var off = (tc.launchOffset || 5) * S;
          var sx = x + Math.cos(a) * off;
          var sy = y + Math.sin(a) * off;
          var col = tc.colors[Math.floor(Math.random() * tc.colors.length)];
          var c = hexRgb(col);
          var tex = getTex(c.r, c.g, c.b, tc.texSharpness || 0.15);
          var life = tc.life.min + Math.random() * (tc.life.max - tc.life.min);
          var size = tc.size.min + Math.random() * (tc.size.max - tc.size.min);
          var bm = tc.blendMode === 'normal' ? PIXI.BLEND_MODES.NORMAL : PIXI.BLEND_MODES.ADD;
          var sprite = new PIXI.Sprite(tex);
          sprite.anchor.set(0.5);
          sprite.x = sx; sprite.y = sy;
          sprite.blendMode = bm;
          app.stage.addChild(sprite);
          ctx._particles.push({
            sprite: sprite, x: sx, y: sy,
            vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
            life: life, maxLife: life, size: size,
            gravity: tc.gravity || 0.1,
            rotation: Math.random() * Math.PI * 2,
            rotSpeed: (Math.random() - 0.5) * 8
          });
        }
      }, tc.delay || 0);
    }
  });
}

// === 更新函数（每帧调用）===
function updateExplosions(ctx, dt) {
  var dtS = dt / 60;

  // 更新火球和冲击波
  for (var i = ctx._effects.length - 1; i >= 0; i--) {
    var e = ctx._effects[i];
    e.life -= dtS;
    if (e.life <= 0) {
      if (e.g.parent) e.g.parent.removeChild(e.g);
      e.g.destroy();
      ctx._effects.splice(i, 1);
      continue;
    }
    var p = 1 - e.life / e.maxLife;
    if (e.maxR !== undefined && e.lineWidth !== undefined) {
      // 冲击波
      e.r = 3 * ctx.SCALE + (e.maxR - 3 * ctx.SCALE) * Math.pow(p, 0.6);
      var alpha = Math.max(0, 1 - p * p);
      var lw = e.lineWidth * ctx.SCALE * (1 - p * 0.6);
      e.g.clear();
      e.g.lineStyle(lw, e.color, alpha);
      e.g.drawCircle(e.x, e.y, e.r);
    } else if (e.maxR !== undefined) {
      // 火球
      var rScale = p < 0.3 ? p / 0.3 : 1 - (p - 0.3) * 0.5;
      e.r = 3 * ctx.SCALE + (e.maxR - 3 * ctx.SCALE) * rScale;
      var alpha = p < 0.6 ? 0.8 : Math.max(0, 0.8 * (1 - (p - 0.6) / 0.4));
      e.g.clear();
      e.g.beginFill(e.color, alpha);
      e.g.drawCircle(e.x, e.y, e.r);
      e.g.beginFill(0xFFFFFF, alpha * 0.5 * (1 - p));
      e.g.drawCircle(e.x, e.y, e.r * 0.4);
      e.g.endFill();
    }
  }

  // 更新粒子
  for (var i = ctx._particles.length - 1; i >= 0; i--) {
    var p = ctx._particles[i];
    p.vy += p.gravity * dtS;
    p.vx *= 0.98;
    p.x += p.vx * dtS;
    p.y += p.vy * dtS;
    p.life -= dtS;
    var progress = 1 - (p.life / p.maxLife);
    var alpha = Math.max(0, p.life / p.maxLife);
    var scaleBurst = progress < 0.2 ? progress / 0.2 : Math.max(0, 1 - (progress - 0.2) / 0.8);
    if (p.sprite) {
      p.sprite.x = p.x;
      p.sprite.y = p.y;
      p.sprite.alpha = alpha * 0.9;
      p.sprite.rotation += p.rotSpeed * dtS;
      p.sprite.scale.set(p.size * ctx.SCALE * scaleBurst);
    }
    if (p.life <= 0) {
      if (p.sprite && p.sprite.parent) p.sprite.parent.removeChild(p.sprite);
      if (p.sprite) p.sprite.destroy();
      ctx._particles.splice(i, 1);
    }
  }
}

// 清理
function cleanupExplosions(ctx) {
  for (var i = ctx._effects.length - 1; i >= 0; i--) {
    var e = ctx._effects[i];
    if (e.g && e.g.parent) e.g.parent.removeChild(e.g);
    if (e.g) e.g.destroy();
  }
  ctx._effects = [];
  for (var i = ctx._particles.length - 1; i >= 0; i--) {
    var p = ctx._particles[i];
    if (p.sprite && p.sprite.parent) p.sprite.parent.removeChild(p.sprite);
    if (p.sprite) p.sprite.destroy();
  }
  ctx._particles = [];
}

  </script>

<body>
  <a href="index.html" class="back-link">← 返回导航</a>
  <div class="effect-name" id="effectName">加载中...</div>

  <div class="header">
    <h1>💥 粒子效果实验室</h1>
    <p>JSON 配置驱动 · 点击屏幕触发</p>
  </div>

  <div class="controls" id="controls"></div>

  <div class="auto-toggle" id="autoBtn" onclick="toggleAuto()">🎯 自动演示: 开</div>
  <div class="hint">👆 点击屏幕任意位置触发爆炸</div>
  <div id="pixi-container"></div>

  <script>
    // === 初始化 PixiJS ===
    var W = window.innerWidth, H = window.innerHeight;
    var SCALE = Math.min(W, H) / 800;
    var app = new PIXI.Application({
      width: W, height: H,
      resolution: window.devicePixelRatio || 1,
      autoDensity: true,
      backgroundAlpha: 0, antialias: true
    });
    document.getElementById('pixi-container').appendChild(app.view);

    // === 爆炸上下文 (被 particle-presets.js 使用) ===
    var explosionCtx = {
      app: app,
      SCALE: SCALE,
      _effects: [],
      _particles: [],
      _texCache: {}
    };

    var currentPreset = 'explosion_fireball';
    var autoDemo = true;
    var autoTimer = 0;

    // 预设列表
    var presetList = [
      { key: 'explosion_fireball', label: '火球爆炸', tag: '爆炸' },
      { key: 'explosion_shockwave', label: '冲击波', tag: '爆炸' },
      { key: 'explosion_debris', label: '碎片爆散', tag: '爆炸' },
      { key: 'explosion_nuke', label: '核爆蘑菇云', tag: '爆炸' },
      { key: 'magic_fire', label: '火焰喷射', tag: '魔法' },
      { key: 'magic_ice', label: '冰霜爆裂', tag: '魔法' },
      { key: 'magic_electric', label: '电光爆炸', tag: '魔法' },
      { key: 'magic_rainbow', label: '七彩星爆', tag: '魔法' },
      { key: 'magic_smoke', label: '浓烟', tag: '效果' },
      { key: 'magic_sparks', label: '火花散射', tag: '效果' },
      { key: 'ambient_snow', label: '飘雪', tag: '环境' },
      { key: 'ambient_rain', label: '下雨', tag: '环境' }
    ];

    // 生成按钮
    var controlsDiv = document.getElementById('controls');
    presetList.forEach(function(p, i) {
      var btn = document.createElement('button');
      btn.className = 'ctrl-btn' + (p.key === currentPreset ? ' active' : '');
      btn.innerHTML = '<span class="num">' + (i + 1) + '</span>' + p.label +
                      '<span class="badge">' + p.tag + '</span>';
      btn.onclick = function() { setPreset(p.key); };
      controlsDiv.appendChild(btn);
    });

    function setPreset(key) {
      currentPreset = key;
      var btns = document.querySelectorAll('.ctrl-btn');
      for (var i = 0; i < btns.length; i++) {
        btns[i].classList.toggle('active', i === presetList.findIndex(function(p) { return p.key === key; }));
      }
      var name = presetList.find(function(p) { return p.key === key; });
      var cat = '';
      for (var c in PRESET_CATEGORIES) {
        if (PRESET_CATEGORIES[c].indexOf(key) >= 0) { cat = ' [' + c + ']'; break; }
      }
      document.getElementById('effectName').textContent = (name ? name.label : key) + cat;
    }

    // 触发爆炸
    function triggerExplosion(x, y) {
      emitPreset(x, y, currentPreset, explosionCtx);
    }

    // 点击触发
    app.view.addEventListener('pointerdown', function(e) {
      triggerExplosion(e.global.x, e.global.y);
    });

    // 自动演示
    function toggleAuto() {
      autoDemo = !autoDemo;
      document.getElementById('autoBtn').textContent = autoDemo ? '🎯 自动演示: 开' : '🎯 自动演示: 关';
    }

    // resize
    window.addEventListener('resize', function() {
      W = window.innerWidth; H = window.innerHeight;
      SCALE = Math.min(W, H) / 800;
      explosionCtx.SCALE = SCALE;
      app.renderer.resize(W, H);
    });

    // 游戏循环
    app.ticker.add(function(delta) {
      updateExplosions(explosionCtx, delta);

      if (autoDemo) {
        window._autoTick = (window._autoTick || 0) + delta;
        if (window._autoTick > 50) {
          window._autoTick = 0;
          var cx = W * 0.2 + Math.random() * W * 0.6;
          var cy = H * 0.2 + Math.random() * H * 0.5;
          triggerExplosion(cx, cy);
        }
      }
    });

    setPreset('explosion_fireball');
  </script>
</body>
