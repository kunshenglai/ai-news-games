<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI Games 游戏导航</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: #0a0a12;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .header {
      text-align: center;
      margin: 30px 0 40px;
    }
    .header h1 {
      font-size: 28px;
      font-weight: 900;
      background: linear-gradient(135deg, #FF6B35, #FFD700, #FF4466);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
    }
    .header p {
      color: #888;
      font-size: 14px;
      margin-top: 8px;
    }
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 800px;
    }
    .game-card {
      background: linear-gradient(145deg, #1a1a2e, #16213e);
      border: 1px solid #333;
      border-radius: 16px;
      padding: 24px;
      text-decoration: none;
      color: inherit;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .game-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, #FF6B35, #FFD700);
    }
    .game-card:hover {
      transform: translateY(-4px);
      border-color: #FF6B35;
      box-shadow: 0 8px 30px rgba(255, 107, 53, 0.2);
    }
    .game-card .icon {
      font-size: 40px;
      margin-bottom: 12px;
    }
    .game-card h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #fff;
    }
    .game-card .desc {
      font-size: 13px;
      color: #aaa;
      line-height: 1.5;
    }
    .game-card .tag {
      display: inline-block;
      margin-top: 12px;
      padding: 4px 10px;
      background: #FF6B3522;
      border: 1px solid #FF6B3544;
      border-radius: 20px;
      font-size: 11px;
      color: #FF6B35;
    }
    .game-card.test::before {
      background: linear-gradient(90deg, #00FF88, #00BFFF);
    }
    .game-card.test:hover {
      border-color: #00FF88;
      box-shadow: 0 8px 30px rgba(0, 255, 136, 0.2);
    }
    .game-card.test .tag {
      background: #00FF8822;
      border-color: #00FF8844;
      color: #00FF88;
    }
    .footer {
      margin-top: 60px;
      color: #555;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎮 AI NEWS GAMES</h1>
    <p>AI 自动生成新闻主题小游戏</p>
  </div>

  <div class="game-grid">
    <a href="game.html" class="game-card">
      <div class="icon">🛡️</div>
      <h2>白宫防御战</h2>
      <div class="desc">点击消灭威胁物，保护建筑！多阶段爆炸特效 + 连击系统</div>
      <span class="tag">🔥 已完成</span>
    </a>

    <a href="particle-test.html" class="game-card test">
      <div class="icon">💥</div>
      <h2>粒子效果实验室</h2>
      <div class="desc">多种爆炸粒子效果对比测试，选择最佳方案</div>
      <span class="tag">🧪 测试中</span>
    </a>
  </div>

  <div class="footer">Generated by AI Agent • GitHub Pages</div>
</body>
</html>
