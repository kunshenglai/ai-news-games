<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>白宫保卫战</title>
  <!-- 引入 PixiJS 用于 WebGL 粒子渲染 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #050208; touch-action: none; font-family: -apple-system, sans-serif; }
    
    /* 层级管理：背景 -> 游戏层 -> 粒子层 (Pixi) -> UI */
    #bg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    #pixi-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; overflow: hidden; }
    
    #ui { position: absolute; top: 0; left: 0; right: 0; padding: max(16px, env(safe-area-inset-top)) 16px 8px 16px;
      display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; z-index: 10; color: #fff; }
    #title-area { max-width: 60%; }
    #title { color: #FFD700; font-size: 18px; font-weight: 900; text-shadow: 0 0 15px #FF4400, 2px 2px 4px #000; letter-spacing: 1px; }
    #subtitle { color: #FF8800; font-size: 12px; margin-top: 4px; }
    
    #score-panel { text-align: right; display: flex; flex-direction: column; align-items: flex-end; }
    #score { font-size: 30px; font-weight: 900; text-shadow: 0 0 20px #FF4400; background: rgba(0,0,0,0.4); padding: 2px 10px; border-radius: 6px; border: 1px solid #FF440066; }
    #combo { font-size: 15px; color: #FFD700; min-height: 20px; font-weight: bold; text-shadow: 0 0 10px #FFD700; }
    #timer { font-size: 14px; color: #fff; margin-top: 6px; font-weight: bold; background: #FF4400; padding: 3px 8px; border-radius: 6px; box-shadow: 0 0 15px #FF440088; }

    #news-bar { position: absolute; bottom: 0; left: 0; right: 0; padding: 8px 16px max(20px, env(safe-area-inset-bottom)) 16px;
      background: linear-gradient(transparent, rgba(0,0,0,0.95)); color: #aaa; font-size: 11px; pointer-events: none; text-align: center; }

    #game-over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
      text-align: center; color: #fff; display: none; z-index: 20; opacity: 0;
      background: linear-gradient(135deg, #1a0a15 0%, #0a0508 100%); width: 85%; max-width: 340px; padding: 28px 20px; border-radius: 24px; border: 2px solid #FF4400;
      box-shadow: 0 0 40px rgba(255, 68, 0, 0.5); transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    #game-over.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    #game-over h2 { color: #FF4400; font-size: 26px; margin-bottom: 20px; text-shadow: 0 0 10px #FF4400; }
    #game-over p { font-size: 17px; margin: 10px 0; color: #ddd; }
    #game-over p span { color: #FFD700; font-weight: bold; font-size: 20px; text-shadow: 0 0 8px #FFD700; }
    #game-over .hint { color: #FF8800; font-size: 14px; margin-top: 28px; animation: pulse 1.5s infinite; }

    #start-screen { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 25; background: radial-gradient(circle at 50% 30%, #1a0a15 0%, #050208 100%); padding: 40px 24px; transition: opacity 0.5s; }
    #start-screen h1 { color: #FF4400; font-size: 34px; margin-bottom: 16px; text-shadow: 0 0 30px #FF4400; text-align: center; animation: titleGlow 2s infinite alternate; }
    #start-screen .news { color: #FF8800; font-size: 16px; text-align: center; margin-bottom: 40px; line-height: 1.6; max-width: 90%; font-weight: bold; background: rgba(255, 68, 0, 0.1); padding: 10px 16px; border-radius: 8px; border: 1px solid #FF440044; }
    #start-screen .desc { color: #bbb; font-size: 15px; margin-bottom: 50px; text-align: center; }
    #start-screen .start-btn { color: #0a0508; background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
      font-size: 22px; font-weight: 900; padding: 16px 64px; border-radius: 44px; border: none; cursor: pointer; animation: pulse 1.5s infinite; box-shadow: 0 6px 25px rgba(255, 215, 0, 0.6); }

    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.06); } }
    @keyframes titleGlow { from { text-shadow: 0 0 30px #FF4400; } to { text-shadow: 0 0 50px #FF4400, 0 0 80px #FF440066; } }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div id="pixi-container"></div>
  <div id="ui">
    <div id="title-area"><div id="title">🏛️ 白宫保卫战</div><div id="subtitle">消除威胁，保护安全</div></div>
    <div id="score-panel"><div id="score">0</div><div id="combo"></div><div id="timer">⏱️ 45s</div></div>
  </div>
  <div id="news-bar">📰 热点: 特朗普在白宫晚宴遭枪击 | 点击消除红色威胁物</div>
  <div id="game-over">
    <h2 id="go-title">任务结束</h2>
    <p>最终得分: <span id="final-score">0</span></p>
    <p>最高连击: <span id="final-combo">0</span></p>
    <p id="go-rating"></p>
    <p class="hint">点击屏幕任意位置重新开始</p>
  </div>
  <div id="start-screen">
    <h1>🏛️ 白宫保卫战</h1>
    <div class="news">📰 突发新闻: 特朗普在白宫晚宴遭枪击</div>
    <div class="desc">特工，请点击红色威胁物，保护白宫安全！</div>
    <div class="start-btn" id="start-btn">立即行动</div>
  </div>

  <!-- 版本号显示 -->
  <div id="version" style="position:absolute; bottom:50px; left:10px; color:#444; font-size:10px; z-index:100; font-family:monospace;">v4.0.1 - Fix Rendering Layer</div>

  <script>
  (() => {
    'use strict';

    // 检查 PixiJS 加载情况
    if (typeof PIXI === 'undefined') {
      console.error("PixiJS CDN failed to load! Falling back to basic mode.");
      document.getElementById('version').innerText = "v3.0.0 - Basic Mode (CDN Error)";
      document.getElementById('version').style.color = "red";
    } else {
      document.getElementById('version').innerText = "v4.0.1 - PixiJS WebGL + Canvas Fix";
    }

    const startBtn = document.getElementById('start-btn');
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over');
    const scoreEl = document.getElementById('score');
    const comboEl = document.getElementById('combo');
    const timerEl = document.getElementById('timer');

    let gameActive = false;
    let gameStarted = false;

    function restartGame() {
      gameActive = true;
      startScreen.style.display = 'none';
      gameOverScreen.style.display = 'none';
      gameOverScreen.classList.remove('show');
      score = 0; combo = 0; maxCombo = 0; missed = 0;
      gameTime = 0; threats = [];
      if (typeof PIXI !== 'undefined' && app) {
        // 清理旧粒子
        while(particles.length) {
          const p = particles.pop();
          app.stage.removeChild(p.sprite);
          p.sprite.destroy();
        }
      }
      threatId = 0; spawnTimer = 0;
      scoreEl.textContent = '0'; comboEl.textContent = '';
    }

    startBtn.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); gameStarted = true; restartGame(); });
    startBtn.addEventListener('touchend', (e) => { e.preventDefault(); gameStarted = true; restartGame(); });

    // === 2D 背景渲染 ===
    const bgCanvas = document.getElementById('bg-canvas');
    const ctx = bgCanvas.getContext('2d', { alpha: false });
    let W, H, SCALE;

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      W = window.innerWidth; H = window.innerHeight;
      bgCanvas.width = W * dpr; bgCanvas.height = H * dpr;
      
      // 修复缩放累加问题：使用 setTransform 替换 scale
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      
      SCALE = Math.min(W / 375, 1.1);
      
      if (app) app.renderer.resize(W, H);
    }
    window.addEventListener('resize', resize);
    resize();

    const CONFIG = { gameDuration: 45, spawnRate: { base: 1.2, max: 4.0, curve: 1.8 }, maxOnScreen: 12,
      types: { start: 3, max: 6, increaseAt: [0.25, 0.5, 0.75] }, tapScore: 15, comboMultiplier: 0.3, maxCombo: 10,
      missLimit: 8, threatSpeed: { base: 0.010, variance: 0.004 } };
    
    const THREAT_COLORS = ['#CC2200', '#DD4400', '#EE6600', '#AA0000', '#DD8800'];
    const PALETTE = { building: '#1a1218', buildingLight: '#2a2028' };

    // === PixiJS 粒子系统 ===
    let app = null;
    let particles = [];

    if (typeof PIXI !== 'undefined') {
      app = new PIXI.Application({
        background: null,
        width: W,
        height: H,
        resolution: window.devicePixelRatio || 1,
        autoDensity: true,
      });
      document.getElementById('pixi-container').appendChild(app.view);

      // 预生成粒子纹理
      function createGradientTexture(r, g, b) {
        const canvas = document.createElement('canvas');
        canvas.width = 64; canvas.height = 64;
        const context = canvas.getContext('2d');
        const gradient = context.createRadialGradient(32, 32, 0, 32, 32, 32);
        gradient.addColorStop(0, `rgba(255,255,255,1)`);
        gradient.addColorStop(0.3, `rgba(${r},${g},${b},0.9)`);
        gradient.addColorStop(1, `rgba(${r},${g},${b},0)`);
        context.fillStyle = gradient;
        context.fillRect(0, 0, 64, 64);
        return PIXI.Texture.from(canvas);
      }

      PIXI.Assets.add('fire_red', createGradientTexture(255, 50, 50));
      PIXI.Assets.add('fire_orange', createGradientTexture(255, 150, 50));
      PIXI.Assets.add('smoke', createGradientTexture(80, 80, 80));
      PIXI.Assets.add('spark', createGradientTexture(255, 255, 200));
    }

    class Particle {
      constructor(x, y, vx, vy, life, textureKey, size) {
        this.x = x; this.y = y; this.vx = vx; this.vy = vy;
        this.life = life; this.maxLife = life; this.size = size;
        this.sprite = new PIXI.Sprite(PIXI.Assets.get(textureKey));
        this.sprite.anchor.set(0.5);
        this.sprite.x = x; this.sprite.y = y;
        this.sprite.blendMode = (textureKey === 'smoke') ? PIXI.BLEND_MODES.NORMAL : PIXI.BLEND_MODES.ADD;
        app.stage.addChild(this.sprite);
      }
      update(dt) {
        const dtSec = dt / 60;
        this.vy += (this.sprite.blendMode === PIXI.BLEND_MODES.NORMAL ? -0.5 : 0.2) * dtSec;
        this.x += this.vx * dtSec; this.y += this.vy * dtSec;
        this.life -= dtSec;
        
        const alpha = Math.max(0, this.life / this.maxLife);
        this.sprite.x = this.x; this.sprite.y = this.y; this.sprite.alpha = alpha;
        this.sprite.scale.set(this.size * SCALE * alpha);
        
        if (this.life <= 0) {
          app.stage.removeChild(this.sprite); this.sprite.destroy(); return false;
        }
        return true;
      }
    }

    function emitParticle(x, y, vx, vy, life, key, size) {
      if (app && particles.length < 2000) particles.push(new Particle(x, y, vx, vy, life, key, size));
    }

    function updateParticles(dt) {
      for (let i = particles.length - 1; i >= 0; i--) if (!particles[i].update(dt)) particles.splice(i, 1);
    }

    function emitExplosion(x, y, color) {
      if (!app) return;
      const rgb = [parseInt(color.slice(1,3),16), parseInt(color.slice(3,5),16), parseInt(color.slice(5,7),16)];
      const isRed = rgb[1] < 100;
      const fireTex = isRed ? 'fire_red' : 'fire_orange';
      
      // 核心闪光
      emitParticle(x, y, 0, 0, 0.1, 'spark', 30);
      // 主体火焰
      for (let i = 0; i < 50; i++) {
        const a = Math.random() * Math.PI * 2; const sp = (2 + Math.random() * 6) * SCALE;
        emitParticle(x, y, Math.cos(a)*sp, Math.sin(a)*sp, 0.5 + Math.random()*0.4, fireTex, 8 + Math.random()*12);
      }
      // 烟雾
      for (let i = 0; i < 15; i++) {
        const a = Math.random() * Math.PI * 2; const sp = (1 + Math.random() * 2) * SCALE;
        emitParticle(x, y, Math.cos(a)*sp, Math.sin(a)*sp - 1, 1.2, 'smoke', 15 + Math.random()*10);
      }
      // 火花
      for (let i = 0; i < 20; i++) {
        const a = Math.random() * Math.PI * 2; const sp = (6 + Math.random() * 10) * SCALE;
        emitParticle(x, y, Math.cos(a)*sp, Math.sin(a)*sp, 0.4, 'spark', 4);
      }
      // 屏幕闪光
      const flash = new PIXI.Graphics(); flash.beginFill(0xFFFFFF);
      flash.drawRect(0, 0, W, H); flash.alpha = 0.4; app.stage.addChild(flash);
      setTimeout(() => { app.stage.removeChild(flash); flash.destroy(); }, 50);
    }

    function emitComboFirework(x, y, combo) {
      if (!app) return;
      const colors = ['fire_red', 'fire_orange', 'spark', 'smoke'];
      for (let i = 0; i < 80 + combo * 10; i++) {
        const a = Math.random() * Math.PI * 2; const sp = (4 + Math.random() * 8) * SCALE;
        emitParticle(x, y, Math.cos(a)*sp, Math.sin(a)*sp - 2, 0.8, colors[Math.floor(Math.random()*colors.length)], 6 + Math.random()*6);
      }
    }

    function emitFailExplosion(x, y) {
      if (!app) return;
      for (let i = 0; i < 60; i++) {
        const a = Math.random() * Math.PI * 2; const sp = (3 + Math.random() * 8) * SCALE;
        emitParticle(x, y, Math.cos(a)*sp, Math.sin(a)*sp, 0.8, 'fire_red', 10 + Math.random()*8);
      }
      const flash = new PIXI.Graphics(); flash.beginFill(0xFF0000);
      flash.drawRect(0, 0, W, H); flash.alpha = 0.8; app.stage.addChild(flash);
      setTimeout(() => { app.stage.removeChild(flash); flash.destroy(); }, 100);
    }

    class Threat {
      constructor(x, y, type, id) {
        this.x = x; this.y = y; this.type = type % 6; this.id = id;
        this.radius = (18 + Math.random() * 8) * SCALE;
        this.targetX = x; this.targetY = H * 0.75 + Math.random() * (H * 0.15);
        this.progress = 0; this.speed = (CONFIG.threatSpeed.base + Math.random() * CONFIG.threatSpeed.variance) * SCALE;
        this.startX = x; this.startY = -50; this.wobble = Math.random() * Math.PI * 2;
        this.alive = true; this.time = Math.random() * 100;
        this.color = THREAT_COLORS[this.type % THREAT_COLORS.length];
      }
      update(dt) { this.progress += this.speed * dt; this.time += 0.08 * dt; this.wobble += 0.06 * dt;
        if (this.progress >= 1) { this.progress = 1; return true; } return false; }
      get position() { const t = this.progress; const e = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
        return { x: this.startX + (this.targetX-this.startX)*e + Math.sin(this.wobble)*6*SCALE,
                 y: this.startY + (this.targetY-this.startY)*e }; }
      render(c) { 
        const p = this.position; const r = this.radius; 
        c.save(); c.translate(p.x, p.y); 
        c.fillStyle = this.color;
        c.beginPath(); c.arc(0, 0, r, 0, Math.PI*2); c.fill(); 
        c.fillStyle = 'rgba(255,255,255,0.3)';
        c.beginPath(); c.arc(-r*0.3, -r*0.3, r*0.2, 0, Math.PI*2); c.fill();
        c.fillStyle = '#000'; c.font = `bold ${r * 1.1}px sans-serif`; c.textAlign = 'center'; c.textBaseline = 'middle';
        c.fillText('⚠', 0, r*0.05); 
        c.restore(); 
      }
      hitTest(x, y) { const p = this.position; const dx = x - p.x, dy = y - p.y; return dx*dx + dy*dy < (this.radius + 14*SCALE)**2; }
    }

    let score = 0, combo = 0, maxCombo = 0, missed = 0;
    let gameTime = 0, threatId = 0, spawnTimer = 0;
    let threats = [];
    let screenShake = { intensity: 0, timer: 0 };

    function drawBackground(c) {
      c.fillStyle = '#0a0510'; c.fillRect(0, 0, W, H);
      drawWhiteHouse(c);
    }

    function drawWhiteHouse(c) {
      const bw = W * 0.75, bh = H * 0.14; const bx = (W - bw) / 2, by = H * 0.82;
      c.save();
      c.fillStyle = 'rgba(0,0,0,0.3)'; c.fillRect(bx+5, by+5, bw, bh);
      c.fillStyle = PALETTE.building; c.fillRect(bx, by, bw, bh);
      c.fillStyle = PALETTE.buildingLight; c.fillRect(bx + bw*0.05, by - bh*0.25, bw*0.9, bh*0.25);
      c.beginPath(); c.moveTo(bx + bw*0.02, by - bh*0.25); c.lineTo(W/2, by - bh*0.55); c.lineTo(bx + bw*0.98, by - bh*0.25); c.closePath(); c.fill();
      c.fillStyle = '#3a3a4a'; const colW = bw*0.04, colGap = bw*0.11;
      for (let i=0; i<7; i++) c.fillRect(bx + bw*0.12 + i*colGap, by - bh*0.2, colW, bh*0.45);
      c.fillStyle = '#FFD70033'; c.fillRect(bx + bw*0.42, by + bh*0.1, bw*0.16, bh*0.4);
      c.fillStyle = '#FF2200'; c.fillRect(W/2 - 2, by - bh*0.6, 4, 15);
      c.fillStyle = '#FFD700'; c.fillRect(W/2 - 8, by - bh*0.6, 16, 10);
      c.restore();
    }

    function getDifficulty() { const p = Math.min(gameTime / CONFIG.gameDuration, 1); return CONFIG.spawnRate.base + Math.pow(p, CONFIG.spawnRate.curve) * (CONFIG.spawnRate.max - CONFIG.spawnRate.base); }
    function getActiveTypes() { const p = gameTime / CONFIG.gameDuration; let t = CONFIG.types.start; CONFIG.types.increaseAt.forEach(th => { if (p > th) t++; }); return Math.min(t, CONFIG.types.max); }
    function spawnThreat() { if (threats.filter(t => t.alive).length >= CONFIG.maxOnScreen) return;
      const types = getActiveTypes(); const type = Math.floor(Math.random() * types);
      const m = 40 * SCALE; threats.push(new Threat(m + Math.random()*(W - 2*m), -50, type, threatId++)); }

    function handleTap(x, y) {
      if (!gameActive) return;
      for (let i = threats.length - 1; i >= 0; i--) {
        const t = threats[i]; if (!t.alive) continue;
        if (t.hitTest(x, y)) {
          t.alive = false;
          combo++; if (combo > maxCombo) maxCombo = combo;
          const cm = 1 + Math.min(combo * CONFIG.comboMultiplier, CONFIG.maxCombo - 1);
          score += Math.round(CONFIG.tapScore * cm);
          const pos = t.position;
          emitExplosion(pos.x, pos.y, t.color);
          if (combo >= 3) { emitComboFirework(pos.x, pos.y, combo); screenShake.intensity = Math.min(combo, 10); screenShake.timer = 0.25; }
          comboEl.textContent = combo >= 2 ? `🔥 ${combo}连击` : ''; scoreEl.textContent = score; return;
        }
      }
      combo = 0; comboEl.textContent = '';
    }

    function gameOver() {
      gameActive = false; const r = score > 3000 ? '🏆 传奇安保' : score > 2000 ? '⭐ 优秀特工' : score > 1000 ? '👍 合格守卫' : '💪 继续加油';
      document.getElementById('final-score').textContent = score; document.getElementById('final-combo').textContent = maxCombo;
      document.getElementById('go-rating').textContent = r; document.getElementById('go-title').textContent = score > 1500 ? '🛡️ 任务完成!' : '⚠️ 威胁突破!';
      gameOverScreen.style.display = 'block'; setTimeout(() => gameOverScreen.classList.add('show'), 10);
    }

    function getEventPos(e) {
      const rect = bgCanvas.getBoundingClientRect();
      return { x: (e.touches ? e.touches[0].clientX : e.clientX) - rect.left, y: (e.touches ? e.touches[0].clientY : e.clientY) - rect.top };
    }

    bgCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); if (!gameStarted) return; if (!gameActive) { restartGame(); return; } handleTap(getEventPos(e).x, getEventPos(e).y); }, { passive: false });
    bgCanvas.addEventListener('mousedown', (e) => { if (!gameStarted) return; if (!gameActive) { restartGame(); return; } handleTap(getEventPos(e).x, getEventPos(e).y); });
    document.body.addEventListener('touchstart', (e) => { if (!gameActive && gameStarted) { restartGame(); } });
    document.body.addEventListener('mousedown', (e) => { if (!gameActive && gameStarted) { restartGame(); } });

    let lastTime = 0;
    function loop(ts) { 
      const dt = Math.min((ts - lastTime) / 16.67, 3); lastTime = ts;
      if (gameActive) { gameTime += dt / 60; spawnTimer += dt / 60;
        if (spawnTimer >= 1 / getDifficulty() && gameTime > 0.5) { spawnThreat(); spawnTimer = 0; }
        threats.forEach(t => { if (!t.alive) return; if (t.update(dt) && Math.random() < 0.02 * dt) { t.alive = false; missed++; combo = 0;
          comboEl.textContent = ''; emitFailExplosion(t.position.x, t.position.y);
          screenShake.intensity = 15; screenShake.timer = 0.4;
          if (missed >= CONFIG.missLimit) gameOver(); } });
        threats = threats.filter(t => t.alive);
        const rem = Math.max(0, CONFIG.gameDuration - gameTime); timerEl.textContent = `⏱️ ${Math.ceil(rem)}s`; if (rem <= 0) gameOver(); }

      if (app) updateParticles(dt); 
      if (screenShake.timer > 0) screenShake.timer -= dt / 60;
      
      ctx.save();
      // 修复：清除时使用不带缩放的坐标
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
      ctx.setTransform(window.devicePixelRatio || 1, 0, 0, window.devicePixelRatio || 1, 0, 0);
      
      if (screenShake.timer > 0) { const s = screenShake.intensity * (screenShake.timer / 0.25); ctx.translate((Math.random()-0.5)*s, (Math.random()-0.5)*s); }
      
      drawBackground(ctx);
      threats.forEach(t => { if (t.alive) t.render(ctx); });
      ctx.restore(); 
      requestAnimationFrame(loop); 
    }
    requestAnimationFrame(loop);
  })();
