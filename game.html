<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>白宫保卫战</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #050208; touch-action: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    canvas { display: block; width: 100%; height: 100%; }
    
    #ui {
      position: absolute; top: 0; left: 0; right: 0;
      padding: max(16px, env(safe-area-inset-top)) 16px 8px 16px;
      display: flex; justify-content: space-between; align-items: flex-start;
      pointer-events: none; z-index: 10; color: #fff;
    }
    #title-area { max-width: 60%; }
    #title { color: #FFD700; font-size: 18px; font-weight: 900; text-shadow: 0 0 15px #FF4400, 2px 2px 4px rgba(0,0,0,0.9); letter-spacing: 1px; }
    #subtitle { color: #FF8800; font-size: 12px; margin-top: 4px; line-height: 1.3; }
    
    #score-panel { text-align: right; display: flex; flex-direction: column; align-items: flex-end; }
    #score { font-size: 30px; font-weight: 900; text-shadow: 0 0 20px #FF4400; letter-spacing: 1px; background: rgba(0,0,0,0.4); padding: 2px 10px; border-radius: 6px; border: 1px solid #FF440066; }
    #combo { font-size: 15px; color: #FFD700; min-height: 20px; font-weight: bold; text-shadow: 0 0 10px #FFD700; }
    #timer { font-size: 14px; color: #fff; margin-top: 6px; font-weight: bold; background: #FF4400; padding: 3px 8px; border-radius: 6px; box-shadow: 0 0 15px #FF440088; }

    #news-bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 8px 16px max(20px, env(safe-area-inset-bottom)) 16px;
      background: linear-gradient(transparent, rgba(0,0,0,0.95));
      color: #aaa; font-size: 11px; pointer-events: none; text-align: center;
    }

    #game-over {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
      text-align: center; color: #fff; display: none; z-index: 20; opacity: 0;
      background: linear-gradient(135deg, #1a0a15 0%, #0a0508 100%); width: 85%; max-width: 340px;
      padding: 28px 20px; border-radius: 24px; border: 2px solid #FF4400;
      box-shadow: 0 0 40px rgba(255, 68, 0, 0.5), inset 0 0 20px rgba(255,68,0,0.1);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    #game-over.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    #game-over h2 { color: #FF4400; font-size: 26px; margin-bottom: 20px; text-shadow: 0 0 10px #FF4400; }
    #game-over p { font-size: 17px; margin: 10px 0; color: #ddd; }
    #game-over p span { color: #FFD700; font-weight: bold; font-size: 20px; text-shadow: 0 0 8px #FFD700; }
    #game-over .hint { color: #FF8800; font-size: 14px; margin-top: 28px; animation: pulse 1.5s infinite; }

    #start-screen {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 25; background: radial-gradient(circle at 50% 30%, #1a0a15 0%, #050208 100%);
      padding: 40px 24px; transition: opacity 0.5s;
    }
    #start-screen h1 { color: #FF4400; font-size: 34px; margin-bottom: 16px; text-shadow: 0 0 30px #FF4400, 0 4px 8px rgba(0,0,0,0.8); text-align: center; animation: titleGlow 2s infinite alternate; }
    #start-screen .news { color: #FF8800; font-size: 16px; text-align: center; margin-bottom: 40px; line-height: 1.6; max-width: 90%; font-weight: bold; background: rgba(255, 68, 0, 0.1); padding: 10px 16px; border-radius: 8px; border: 1px solid #FF440044; }
    #start-screen .desc { color: #bbb; font-size: 15px; margin-bottom: 50px; text-align: center; }
    #start-screen .start-btn {
      color: #0a0508; background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
      font-size: 22px; font-weight: 900; padding: 16px 64px; border-radius: 44px; border: none; cursor: pointer;
      animation: pulse 1.5s infinite; box-shadow: 0 6px 25px rgba(255, 215, 0, 0.6); letter-spacing: 2px;
    }

    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.06); } }
    @keyframes titleGlow { from { text-shadow: 0 0 30px #FF4400; } to { text-shadow: 0 0 50px #FF4400, 0 0 80px #FF440066; } }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="ui">
    <div id="title-area"><div id="title">🏛️ 白宫保卫战</div><div id="subtitle">消除威胁，保护安全</div></div>
    <div id="score-panel"><div id="score">0</div><div id="combo"></div><div id="timer">⏱️ 45s</div></div>
  </div>
  <div id="news-bar">📰 热点: 特朗普在白宫晚宴遭枪击 | 点击消除红色威胁物</div>
  <div id="game-over">
    <h2 id="go-title">任务结束</h2>
    <p>最终得分: <span id="final-score">0</span></p>
    <p>最高连击: <span id="final-combo">0</span></p>
    <p id="go-rating"></p>
    <p class="hint">点击屏幕任意位置重新开始</p>
  </div>
  <div id="start-screen">
    <h1>🏛️ 白宫保卫战</h1>
    <div class="news">📰 突发新闻: 特朗普在白宫晚宴遭枪击</div>
    <div class="desc">特工，请点击红色威胁物，保护白宫安全！</div>
    <div class="start-btn" id="start-btn">立即行动</div>
  </div>

  <script>
  (() => {
    'use strict';

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d', { alpha: false });
    let W, H, SCALE;

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      ctx.scale(dpr, dpr);
      SCALE = Math.min(W / 375, 1.1);
    }
    window.addEventListener('resize', resize);
    resize();

    const CONFIG = {
      gameDuration: 45,
      spawnRate: { base: 1.2, max: 4.0, curve: 1.8 },
      maxOnScreen: 12,
      types: { start: 3, max: 6, increaseAt: [0.25, 0.5, 0.75] },
      tapScore: 15,
      comboMultiplier: 0.3,
      maxCombo: 10,
      missLimit: 8,
      threatSpeed: { base: 0.010, variance: 0.004 }
    };

    const PALETTE = {
      bg: '#050208', primary: '#FF2200', secondary: '#FF6600',
      accent: '#FFD700', threat: ['#FF2200', '#FF4400', '#FF6600', '#CC0000', '#FF8800'],
      building: '#1a1218', buildingLight: '#2a2028'
    };

    // === 高级粒子系统 ===
    let particles = [];
    class Particle {
      constructor(x, y, vx, vy, life, color, size, type = 'circle') {
        this.x = x; this.y = y; this.vx = vx; this.vy = vy;
        this.life = life; this.maxLife = life; this.color = color;
        this.size = size * SCALE; this.type = type; 
        this.rotation = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - 0.5) * 0.4;
        this.alpha = 1;
      }
      update(dt) {
        this.vy += 0.2 * dt; this.vx *= 0.98; this.vy *= 0.98;
        this.x += this.vx * dt; this.y += this.vy * dt;
        this.life -= dt; this.rotation += this.rotSpeed * dt;
        this.alpha = Math.max(0, this.life / this.maxLife);
        return this.life > 0;
      }
      render(ctx) {
        const s = this.size * this.alpha;
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.translate(this.x, this.y); ctx.rotate(this.rotation);
        
        if (this.type === 'fire') {
          ctx.fillStyle = this.color;
          ctx.shadowColor = this.color; ctx.shadowBlur = s;
          ctx.beginPath(); ctx.arc(0, 0, s, 0, Math.PI * 2); ctx.fill();
        } else if (this.type === 'spark') {
          ctx.strokeStyle = this.color; ctx.lineWidth = 1.5;
          ctx.shadowColor = this.color; ctx.shadowBlur = 4;
          ctx.beginPath(); ctx.moveTo(-s, 0); ctx.lineTo(s, 0); ctx.stroke();
        } else if (this.type === 'debris') {
          ctx.fillStyle = this.color;
          ctx.fillRect(-s, -s * 0.6, s * 2, s * 1.2);
        } else if (this.type === 'smoke') {
          ctx.fillStyle = `rgba(100,80,80,${this.alpha * 0.4})`;
          ctx.beginPath(); ctx.arc(0, 0, s * 1.5, 0, Math.PI * 2); ctx.fill();
        } else if (this.type === 'ring') {
          ctx.strokeStyle = this.color; ctx.lineWidth = 3;
          ctx.shadowColor = this.color; ctx.shadowBlur = 8;
          ctx.beginPath(); ctx.arc(0, 0, s * (2 - this.alpha) * 2, 0, Math.PI * 2); ctx.stroke();
        } else if (this.type === 'star') {
          ctx.fillStyle = this.color; ctx.shadowColor = this.color; ctx.shadowBlur = 5;
          this.drawStar(ctx, 0, 0, s, s * 0.4, 5);
        } else if (this.type === 'confetti') {
          ctx.fillStyle = this.color;
          ctx.fillRect(-s, -s * 0.25, s * 2, s * 0.5);
        } else {
          ctx.fillStyle = this.color; ctx.shadowColor = this.color; ctx.shadowBlur = s;
          ctx.beginPath(); ctx.arc(0, 0, s, 0, Math.PI * 2); ctx.fill();
        }
        ctx.restore();
      }
      drawStar(ctx, cx, cy, or, ir, pts) {
        ctx.beginPath();
        for (let i = 0; i < pts * 2; i++) {
          const r = i % 2 === 0 ? or : ir;
          const a = (Math.PI / pts) * i - Math.PI / 2;
          i === 0 ? ctx.moveTo(cx + Math.cos(a)*r, cy + Math.sin(a)*r) : ctx.lineTo(cx + Math.cos(a)*r, cy + Math.sin(a)*r);
        }
        ctx.closePath(); ctx.fill();
      }
    }

    // 多重爆炸效果
    function emitExplosion(x, y, color, count = 25) {
      // 1. 火焰核心
      for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const sp = (1 + Math.random() * 6) * SCALE;
        particles.push(new Particle(x, y, Math.cos(a)*sp, Math.sin(a)*sp, 0.4 + Math.random()*0.5, 
          color, 3 + Math.random()*4, 'fire'));
      }
      // 2. 碎片飞溅
      for (let i = 0; i < count * 0.6; i++) {
        const a = Math.random() * Math.PI * 2;
        const sp = (2 + Math.random() * 8) * SCALE;
        particles.push(new Particle(x, y, Math.cos(a)*sp, Math.sin(a)*sp - 2, 
          0.5 + Math.random()*0.6, '#3a1a0a', 2 + Math.random()*3, 'debris'));
      }
      // 3. 火花
      for (let i = 0; i < 8; i++) {
        const a = Math.random() * Math.PI * 2;
        const sp = (3 + Math.random() * 5) * SCALE;
        particles.push(new Particle(x, y, Math.cos(a)*sp, Math.sin(a)*sp, 
          0.3, '#FFF', 1 + Math.random()*2, 'spark'));
      }
      // 4. 烟雾
      for (let i = 0; i < 5; i++) {
        particles.push(new Particle(x + (Math.random()-0.5)*20, y + (Math.random()-0.5)*20,
          (Math.random()-0.5)*1, -0.5 - Math.random(), 1.0 + Math.random(), '#888', 5 + Math.random()*5, 'smoke'));
      }
      // 5. 冲击波环
      particles.push(new Particle(x, y, 0, 0, 0.35, color, 10, 'ring'));
    }

    // 连击烟花
    function emitComboFirework(x, y, combo) {
      const colors = ['#FF6B6B', '#FFD93D', '#6BCB77', '#4D96FF', '#FF6BD6', '#FF8800'];
      for (let i = 0; i < 30 + combo * 5; i++) {
        const a = Math.random() * Math.PI * 2;
        const sp = (2 + Math.random() * 7) * SCALE;
        const c = colors[Math.floor(Math.random() * colors.length)];
        particles.push(new Particle(x, y, Math.cos(a)*sp, Math.sin(a)*sp - 2,
          0.8 + Math.random()*0.5, c, 3 + Math.random()*4, Math.random() > 0.5 ? 'star' : 'fire'));
      }
      // 彩带
      for (let i = 0; i < 20; i++) {
        const a = Math.random() * Math.PI * 2;
        const sp = (1 + Math.random() * 4) * SCALE;
        particles.push(new Particle(x, y, Math.cos(a)*sp, Math.sin(a)*sp - 1,
          1.5, colors[Math.floor(Math.random()*colors.length)], 4 + Math.random()*3, 'confetti'));
      }
    }

    function emitRipple(x, y) {
      particles.push(new Particle(x, y, 0, 0, 0.25, 'rgba(255,255,255,0.6)', 5, 'ring'));
    }

    // === 浮动文字 ===
    let floatingTexts = [];
    class FloatingText {
      constructor(x, y, text, color = '#fff', size = 16) {
        this.x = x; this.y = y; this.text = text; this.color = color;
        this.life = 1.0; this.size = size * SCALE;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = -2 - Math.random() * 2;
      }
      update(dt) { 
        this.x += this.vx * dt; this.y += this.vy * dt; this.vy *= 0.98;
        this.life -= 0.025 * dt; return this.life > 0; 
      }
      render(ctx) {
        ctx.save(); ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.font = `900 ${this.size}px -apple-system, sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(0,0,0,0.9)'; ctx.shadowBlur = 6; ctx.shadowOffsetY = 2;
        ctx.fillText(this.text, this.x, this.y);
        ctx.restore();
      }
    }

    // === 威胁物工厂 ===
    class Threat {
      constructor(x, y, type, id) {
        this.x = x; this.y = y;
        this.type = type % 6; // 6种不同类型
        this.id = id;
        this.radius = (18 + Math.random() * 8) * SCALE;
        this.targetX = x; this.targetY = H * 0.75 + Math.random() * (H * 0.15);
        this.progress = 0; 
        this.speed = (CONFIG.threatSpeed.base + Math.random() * CONFIG.threatSpeed.variance) * SCALE;
        this.startX = x; this.startY = -50;
        this.wobble = Math.random() * Math.PI * 2;
        this.alive = true; this.time = Math.random() * 100;
        this.color = PALETTE.threat[this.type % PALETTE.threat.length];
        this.innerColor = '#1a0500';
        this.glowIntensity = 0.5;
      }
      update(dt) {
        this.progress += this.speed * dt;
        this.time += 0.08 * dt;
        this.wobble += 0.06 * dt;
        this.glowIntensity = 0.4 + Math.sin(this.time * 3) * 0.3;
        if (this.progress >= 1) { this.progress = 1; return true; }
        return false;
      }
      get position() {
        const t = this.progress;
        const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
        return {
          x: this.startX + (this.targetX - this.startX) * ease + Math.sin(this.wobble) * 6 * SCALE,
          y: this.startY + (this.targetY - this.startY) * ease
        };
      }
      render(ctx) {
        const pos = this.position;
        const r = this.radius;
        ctx.save();
        ctx.translate(pos.x, pos.y);

        // 外部光晕
        const glow = ctx.createRadialGradient(0, 0, r * 0.5, 0, 0, r * 2.5);
        glow.addColorStop(0, this.color + 'AA');
        glow.addColorStop(0.4, this.color + '33');
        glow.addColorStop(1, 'transparent');
        ctx.fillStyle = glow;
        ctx.beginPath(); ctx.arc(0, 0, r * 2.5, 0, Math.PI * 2); ctx.fill();

        // 根据类型绘制不同形状
        switch (this.type) {
          case 0: this.drawBomb(ctx, r); break;
          case 1: this.drawMeteor(ctx, r); break;
          case 2: this.drawDrone(ctx, r); break;
          case 3: this.drawSkull(ctx, r); break;
          case 4: this.drawLightning(ctx, r); break;
          case 5: this.drawSpikeBall(ctx, r); break;
        }

        ctx.restore();
      }
      drawBomb(ctx, r) {
        // 炸弹造型
        ctx.fillStyle = '#1a0a00'; ctx.strokeStyle = this.color; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        
        // 引信
        ctx.strokeStyle = '#FF8800'; ctx.lineWidth = 3 * SCALE; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(0, -r); 
        ctx.quadraticCurveTo(r * 0.5, -r * 1.5, r * 0.3, -r * 1.8); ctx.stroke();
        // 火花
        const sp = Math.sin(this.time * 20) * 2;
        ctx.fillStyle = '#FFF';
        ctx.beginPath(); ctx.arc(r * 0.3, -r * 1.8 + sp, 3 * SCALE, 0, Math.PI * 2); ctx.fill();
        // 内部纹理
        ctx.fillStyle = this.color + '44';
        ctx.beginPath(); ctx.arc(-r*0.2, -r*0.2, r*0.3, 0, Math.PI*2); ctx.fill();
      }
      drawMeteor(ctx, r) {
        // 陨石造型
        const rot = this.time * 2;
        ctx.rotate(rot);
        ctx.fillStyle = '#2a1000'; ctx.strokeStyle = this.color; ctx.lineWidth = 2;
        ctx.beginPath();
        for (let i = 0; i < 8; i++) {
          const a = (Math.PI * 2 / 8) * i;
          const rad = r * (0.7 + Math.sin(i * 3.7) * 0.3);
          const x = Math.cos(a) * rad, y = Math.sin(a) * rad;
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.closePath(); ctx.fill(); ctx.stroke();
        // 灼热核心
        ctx.fillStyle = this.color + '88';
        ctx.beginPath(); ctx.arc(0, 0, r * 0.4, 0, Math.PI * 2); ctx.fill();
      }
      drawDrone(ctx, r) {
        // 无人机造型
        const bob = Math.sin(this.time * 15) * 2;
        ctx.fillStyle = '#0a1520'; ctx.strokeStyle = '#4488FF'; ctx.lineWidth = 2;
        // 主体
        ctx.beginPath(); ctx.arc(0, bob, r * 0.6, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        // 旋翼
        ctx.strokeStyle = '#88BBFF'; ctx.lineWidth = 2;
        for (let i = 0; i < 4; i++) {
          const a = (Math.PI / 2) * i + this.time * 10;
          ctx.beginPath(); 
          ctx.moveTo(0, bob);
          ctx.lineTo(Math.cos(a) * r * 1.2, bob + Math.sin(a) * r * 0.2);
          ctx.stroke();
        }
        // 红点
        ctx.fillStyle = '#FF2200';
        ctx.beginPath(); ctx.arc(0, bob, 3 * SCALE, 0, Math.PI * 2); ctx.fill();
      }
      drawSkull(ctx, r) {
        // 骷髅头
        ctx.fillStyle = '#2a2a2a'; ctx.strokeStyle = this.color; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(0, -r * 0.1, r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        // 眼窝
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(-r * 0.35, -r * 0.2, r * 0.25, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(r * 0.35, -r * 0.2, r * 0.25, 0, Math.PI * 2); ctx.fill();
        // 下巴
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(-r * 0.4, r * 0.3, r * 0.8, r * 0.6);
        // 牙齿
        ctx.fillStyle = '#444';
        for (let i = 0; i < 4; i++) {
          ctx.fillRect(-r * 0.35 + i * r * 0.2, r * 0.4, r * 0.12, r * 0.4);
        }
        // 红光眼
        ctx.fillStyle = '#FF2200'; ctx.shadowColor = '#FF2200'; ctx.shadowBlur = 10;
        ctx.beginPath(); ctx.arc(-r * 0.35, -r * 0.2, r * 0.1, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(r * 0.35, -r * 0.2, r * 0.1, 0, Math.PI * 2); ctx.fill();
      }
      drawLightning(ctx, r) {
        // 闪电球
        ctx.fillStyle = '#0a0520'; ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        // 闪电纹
        ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2 * SCALE; ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 5;
        ctx.beginPath();
        ctx.moveTo(-r * 0.3, -r * 0.6);
        ctx.lineTo(r * 0.1, -r * 0.1); ctx.lineTo(-r * 0.1, -r * 0.1);
        ctx.lineTo(r * 0.3, r * 0.6); ctx.stroke();
        // 电弧
        ctx.strokeStyle = this.color + '66'; ctx.lineWidth = 1;
        for (let i = 0; i < 4; i++) {
          const a = (Math.PI / 2) * i + this.time * 5;
          ctx.beginPath(); ctx.moveTo(0, 0);
          ctx.lineTo(Math.cos(a) * r * 1.3, Math.sin(a) * r * 1.3); ctx.stroke();
        }
      }
      drawSpikeBall(ctx, r) {
        // 刺球
        ctx.fillStyle = '#1a0000'; ctx.strokeStyle = '#FF4400'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(0, 0, r * 0.7, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        // 刺
        ctx.fillStyle = this.color;
        const rot = this.time * 3;
        for (let i = 0; i < 12; i++) {
          const a = (Math.PI * 2 / 12) * i + rot;
          const inner = r * 0.7, outer = r * 1.3;
          ctx.beginPath();
          ctx.moveTo(Math.cos(a - 0.15) * inner, Math.sin(a - 0.15) * inner);
          ctx.lineTo(Math.cos(a) * outer, Math.sin(a) * outer);
          ctx.lineTo(Math.cos(a + 0.15) * inner, Math.sin(a + 0.15) * inner);
          ctx.fill();
        }
      }
      hitTest(x, y) {
        const pos = this.position;
        const dx = x - pos.x, dy = y - pos.y;
        return dx * dx + dy * dy < (this.radius + 14 * SCALE) ** 2;
      }
    }

    // === 游戏状态 ===
    let score = 0, combo = 0, maxCombo = 0, missed = 0;
    let gameTime = 0, gameActive = false, gameStarted = false;
    let threats = []; let threatId = 0; let spawnTimer = 0;
    let screenShake = { intensity: 0, timer: 0 };
    
    // 动态背景元素
    let clouds = [];
    for (let i = 0; i < 5; i++) {
      clouds.push({ x: Math.random() * 500, y: Math.random() * 200, w: 80 + Math.random() * 100, alpha: 0.05 + Math.random() * 0.05, speed: 0.1 + Math.random() * 0.2 });
    }
    let radarAngle = 0;

    // === 背景绘制 ===
    function drawBackground(time) {
      // 夜空渐变
      const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
      bgGrad.addColorStop(0, '#0a0510');
      bgGrad.addColorStop(0.5, '#1a0a15');
      bgGrad.addColorStop(1, '#2a0a08');
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, W, H);

      // 云层移动
      clouds.forEach(c => {
        c.x += c.speed;
        if (c.x > W + c.w) c.x = -c.w;
        ctx.fillStyle = `rgba(255, 40, 0, ${c.alpha})`;
        ctx.beginPath();
        ctx.ellipse(c.x, c.y, c.w / 2, 15 * SCALE, 0, 0, Math.PI * 2);
        ctx.fill();
      });

      // 雷达扫描线
      radarAngle += 0.01;
      ctx.strokeStyle = 'rgba(255, 68, 0, 0.15)'; ctx.lineWidth = 2;
      ctx.save(); ctx.translate(W * 0.85, H * 0.15);
      ctx.rotate(radarAngle);
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(40 * SCALE, 0); ctx.stroke();
      ctx.beginPath(); ctx.arc(0, 0, 40 * SCALE, radarAngle - 0.3, radarAngle);
      ctx.fillStyle = 'rgba(255, 68, 0, 0.1)'; ctx.fill();
      ctx.restore();

      drawWhiteHouse();
    }

    function drawWhiteHouse() {
      const bw = W * 0.75, bh = H * 0.14;
      const bx = (W - bw) / 2, by = H * 0.82;

      ctx.save();
      // 建筑阴影
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(bx + 5, by + 5, bw, bh);

      // 主体
      ctx.fillStyle = PALETTE.building;
      ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = PALETTE.buildingLight;
      ctx.fillRect(bx + bw * 0.05, by - bh * 0.25, bw * 0.9, bh * 0.25);

      // 三角顶
      ctx.beginPath();
      ctx.moveTo(bx + bw * 0.02, by - bh * 0.25);
      ctx.lineTo(W / 2, by - bh * 0.55);
      ctx.lineTo(bx + bw * 0.98, by - bh * 0.25);
      ctx.closePath(); ctx.fill();

      // 柱子
      ctx.fillStyle = '#3a3a4a';
      const colW = bw * 0.04, colGap = bw * 0.11;
      for (let i = 0; i < 7; i++) {
        ctx.fillRect(bx + bw * 0.12 + i * colGap, by - bh * 0.2, colW, bh * 0.45);
      }

      // 门和窗户光
      ctx.fillStyle = '#FFD70033';
      ctx.fillRect(bx + bw * 0.42, by + bh * 0.1, bw * 0.16, bh * 0.4);
      ctx.fillStyle = '#FFD70022';
      for (let i = 0; i < 5; i++) {
        ctx.fillRect(bx + bw * 0.15 + i * bw * 0.14, by - bh * 0.1, bw * 0.08, bh * 0.1);
      }

      // 国旗飘扬动画
      const wave = Math.sin(Date.now() * 0.005) * 2;
      ctx.fillStyle = '#FF2200';
      ctx.fillRect(W / 2 - 2, by - bh * 0.6, 4, 15);
      ctx.fillStyle = '#FFD700';
      ctx.fillRect(W / 2 - 8, by - bh * 0.6 + wave, 16, 10);

      ctx.restore();
    }

    function getDifficulty() {
      const p = Math.min(gameTime / CONFIG.gameDuration, 1);
      return CONFIG.spawnRate.base + Math.pow(p, CONFIG.spawnRate.curve) * (CONFIG.spawnRate.max - CONFIG.spawnRate.base);
    }
    function getActiveTypes() {
      const p = gameTime / CONFIG.gameDuration;
      let t = CONFIG.types.start;
      CONFIG.types.increaseAt.forEach(th => { if (p > th) t++; });
      return Math.min(t, CONFIG.types.max);
    }
    function spawnThreat() {
      if (threats.filter(t => t.alive).length >= CONFIG.maxOnScreen) return;
      const types = getActiveTypes();
      const type = Math.floor(Math.random() * types);
      const m = 40 * SCALE;
      threats.push(new Threat(m + Math.random() * (W - 2 * m), -50, type, threatId++));
    }

    function handleTap(x, y) {
      if (!gameActive) return;
      let hit = false;
      emitRipple(x, y);

      for (let i = threats.length - 1; i >= 0; i--) {
        const t = threats[i];
        if (!t.alive) continue;
        if (t.hitTest(x, y)) {
          t.alive = false; hit = true;
          combo++;
          if (combo > maxCombo) maxCombo = combo;
          const cm = 1 + Math.min(combo * CONFIG.comboMultiplier, CONFIG.maxCombo - 1);
          const earned = Math.round(CONFIG.tapScore * cm);
          score += earned;

          const pos = t.position;
          emitExplosion(pos.x, pos.y, t.color, 25);
          floatingTexts.push(new FloatingText(pos.x, pos.y - 20, `+${earned}`, combo >= 3 ? '#FFD700' : '#fff', 16 + Math.min(combo, 5) * 2));

          if (combo >= 3) {
            emitComboFirework(pos.x, pos.y, combo);
            floatingTexts.push(new FloatingText(pos.x, pos.y - 50, `🔥 ${combo}连击!`, '#FF4400', 18));
            screenShake.intensity = Math.min(combo, 10);
            screenShake.timer = 0.25;
          }

          document.getElementById('combo').textContent = combo >= 2 ? `🔥 ${combo}连击` : '';
          updateScore();
          break;
        }
      }
      if (!hit) { combo = 0; document.getElementById('combo').textContent = ''; }
    }

    function updateScore() { document.getElementById('score').textContent = score; }

    function gameOver() {
      gameActive = false;
      const r = score > 3000 ? '🏆 传奇安保' : score > 2000 ? '⭐ 优秀特工' : score > 1000 ? '👍 合格守卫' : '💪 继续加油';
      document.getElementById('final-score').textContent = score;
      document.getElementById('final-combo').textContent = maxCombo;
      document.getElementById('go-rating').textContent = r;
      document.getElementById('go-title').textContent = score > 1500 ? '🛡️ 任务完成!' : '⚠️ 威胁突破!';
      const go = document.getElementById('game-over'); go.style.display = 'block';
      setTimeout(() => go.classList.add('show'), 10);
    }

    function restart() {
      score = 0; combo = 0; maxCombo = 0; missed = 0;
      gameTime = 0; threats = []; particles = []; floatingTexts = [];
      threatId = 0; spawnTimer = 0; gameActive = true;
      document.getElementById('score').textContent = '0';
      document.getElementById('combo').textContent = '';
      document.getElementById('game-over').style.display = 'none';
      document.getElementById('start-screen').style.display = 'none';
    }

    function getEventPos(e) {
      const rect = canvas.getBoundingClientRect();
      return { x: (e.touches ? e.touches[0].clientX : e.clientX) - rect.left,
               y: (e.touches ? e.touches[0].clientY : e.clientY) - rect.top };
    }

    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (!gameStarted) return;
      if (!gameActive) { restart(); return; }
      const p = getEventPos(e); handleTap(p.x, p.y);
    }, { passive: false });

    canvas.addEventListener('mousedown', (e) => {
      if (!gameStarted) return;
      if (!gameActive) { restart(); return; }
      const p = getEventPos(e); handleTap(p.x, p.y);
    });

    document.getElementById('start-btn').addEventListener('click', (e) => { e.stopPropagation(); gameStarted = true; restart(); });

    let lastTime = 0;
    function loop(ts) {
      const dt = Math.min((ts - lastTime) / 16.67, 3); lastTime = ts;

      if (gameActive) {
        gameTime += dt / 60;
        spawnTimer += dt / 60;
        if (spawnTimer >= 1 / getDifficulty() && gameTime > 0.5) { spawnThreat(); spawnTimer = 0; }

        threats.forEach(t => {
          if (!t.alive) return;
          if (t.update(dt) && Math.random() < 0.02 * dt) {
            t.alive = false; missed++; combo = 0;
            document.getElementById('combo').textContent = '';
            emitExplosion(t.position.x, t.position.y, '#FF0000', 10);
            if (missed >= CONFIG.missLimit) gameOver();
          }
        });
        threats = threats.filter(t => t.alive);
        const rem = Math.max(0, CONFIG.gameDuration - gameTime);
        document.getElementById('timer').textContent = `⏱️ ${Math.ceil(rem)}s`;
        if (rem <= 0) gameOver();
      }

      particles = particles.filter(p => p.update(dt));
      floatingTexts = floatingTexts.filter(f => f.update(dt));
      if (screenShake.timer > 0) screenShake.timer -= dt / 60;

      ctx.save();
      if (screenShake.timer > 0) {
        const s = screenShake.intensity * (screenShake.timer / 0.25);
        ctx.translate((Math.random()-0.5)*s, (Math.random()-0.5)*s);
      }

      drawBackground(ts/1000);
      threats.forEach(t => { if (t.alive) t.render(ctx); });
      particles.forEach(p => p.render(ctx));
      floatingTexts.forEach(f => f.render(ctx));

      if (gameActive) {
        const mp = missed / CONFIG.missLimit;
        ctx.fillStyle = '#440000'; ctx.fillRect(16, H - 24, W - 32, 6);
        ctx.fillStyle = mp > 0.7 ? '#FF2200' : '#FF8800'; ctx.fillRect(16, H - 24, (W-32)*mp, 6);
        const tp = 1 - (gameTime / CONFIG.gameDuration);
        ctx.fillStyle = '#111'; ctx.fillRect(16, H - 32, W - 32, 4);
        ctx.fillStyle = '#4488FF'; ctx.fillRect(16, H - 32, (W-32)*tp, 4);
      }

      ctx.restore();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  })();
  </script>
</body>
