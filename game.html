<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>白宫保卫战</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #050208; touch-action: none; font-family: -apple-system, sans-serif; }
    #bg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    #pixi-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
    #ui { position: absolute; top: 0; left: 0; right: 0; padding: max(16px, env(safe-area-inset-top)) 16px 8px 16px; display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; z-index: 10; color: #fff; }
    #title-area { max-width: 60%; }
    #title { color: #FFD700; font-size: 18px; font-weight: 900; text-shadow: 0 0 15px #FF4400, 2px 2px 4px #000; }
    #subtitle { color: #FF8800; font-size: 12px; margin-top: 4px; }
    #score-panel { text-align: right; display: flex; flex-direction: column; align-items: flex-end; }
    #score { font-size: 30px; font-weight: 900; text-shadow: 0 0 20px #FF4400; background: rgba(0,0,0,0.4); padding: 2px 10px; border-radius: 6px; border: 1px solid #FF440066; display: inline-block; }
    #score.bump { animation: scoreBump 0.2s ease-out; }
    @keyframes scoreBump { 0% { transform: scale(1); } 40% { transform: scale(1.25); } 100% { transform: scale(1); } }
    #combo { font-size: 15px; color: #FFD700; min-height: 20px; font-weight: bold; }
    #timer { font-size: 14px; color: #fff; margin-top: 6px; font-weight: bold; background: #FF4400; padding: 3px 8px; border-radius: 6px; }
    #phase { font-size: 12px; color: #00FF88; margin-top: 4px; font-weight: bold; }
    #news-bar { position: absolute; bottom: 0; left: 0; right: 0; padding: 8px 16px max(20px, env(safe-area-inset-bottom)) 16px; background: linear-gradient(transparent, rgba(0,0,0,0.95)); color: #aaa; font-size: 11px; pointer-events: none; text-align: center; }
    #game-over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #fff; display: none; z-index: 20; background: rgba(0,0,0,0.9); width: 80%; max-width: 320px; padding: 24px; border-radius: 16px; border: 2px solid #FF4400; }
    #game-over h2 { color: #FF4400; font-size: 24px; margin-bottom: 16px; }
    #game-over p { font-size: 16px; margin: 8px 0; }
    #game-over span { color: #FFD700; font-weight: bold; }
    #start-screen { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 25; background: rgba(10,5,8,0.98); }
    #start-screen h1 { color: #FF4400; font-size: 32px; margin-bottom: 16px; text-shadow: 0 0 20px #FF4400; }
    #start-screen .news { color: #FF8800; font-size: 14px; text-align: center; margin-bottom: 32px; }
    #start-screen .start-btn { color: #0a0508; background: #FFD700; font-size: 20px; font-weight: bold; padding: 14px 48px; border-radius: 40px; border: none; }
    #version { position: absolute; bottom: 40px; left: 10px; color: #00FF00; font-size: 11px; z-index: 100; font-family: monospace; background: rgba(0,0,0,0.6); padding: 3px 6px; border-radius: 4px; }
    /* 道具收集通知 */
    #powerup-notification { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); color: #fff; font-size: 22px; font-weight: bold; text-shadow: 0 0 20px currentColor, 0 2px 4px #000; pointer-events: none; z-index: 15; opacity: 0; transition: opacity 0.3s; text-align: center; white-space: nowrap; }
    #powerup-notification.show { animation: notifPop 1.2s ease-out forwards; }
    @keyframes notifPop { 0% { opacity: 0; transform: translateX(-50%) scale(0.5) translateY(20px); } 20% { opacity: 1; transform: translateX(-50%) scale(1.1) translateY(0); } 40% { transform: translateX(-50%) scale(1) translateY(0); } 80% { opacity: 1; } 100% { opacity: 0; transform: translateX(-50%) translateY(-30px); } }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div id="pixi-container"></div>
  <div id="ui">
    <div id="title-area"><div id="title">🏛️ 白宫保卫战</div><div id="subtitle">消除威胁，保护安全</div></div>
    <div id="score-panel"><div id="score">0</div><div id="combo"></div><div id="timer">⏱️ 45s</div><div id="phase"></div></div>
  </div>
  <div id="news-bar">📰 热点: 特朗普在白宫晚宴遭枪击 | 点击消除红色威胁物</div>
  <div id="game-over">
    <h2 id="go-title">任务结束</h2>
    <p>最终得分: <span id="final-score">0</span></p>
    <p>最高连击: <span id="final-combo">0</span></p>
    <p id="go-rating"></p>
    <p>历史最高: <span id="high-score">0</span></p>
  </div>
  <div id="start-screen">
    <h1>🏛️ 白宫保卫战</h1>
    <div class="news">📰 突发: 特朗普在白宫晚宴遭枪击</div>
    <div class="start-btn" id="start-btn">立即行动</div>
  </div>
  <div id="powerup-notification"></div>
  <div id="version">v5.6.0 - Visual Overhaul</div>

  <script>
  (function() {
    'use strict';
    console.log('[GAME] Script starting');

    var bgCanvas = document.getElementById('bg-canvas');
    var ctx = bgCanvas.getContext('2d', { alpha: false });
    var W = 0, H = 0, SCALE = 1;
    var app = null;
    var particles = [];
    var particleTextures = {};
    var gameActive = false;
    var gameStarted = false;
    var score = 0, combo = 0, maxCombo = 0, missed = 0;
    var gameTime = 0, threatId = 0, spawnTimer = 0;
    var threats = [];
    var screenShake = { intensity: 0, timer: 0, offsetX: 0, offsetY: 0 };
    var powerUps = [];
    var powerUpSpawnTimer = 0;
    var shieldActive = false;
    var freezeActive = false;
    var freezeTimer = 0;
    var bossSpawned = false;
    var bossDefeated = false;
    var highScore = 0;

    // === 新增: 星空系统 ===
    var stars = [];
    var STAR_COUNT = 80;

    // === 新增: 拖尾粒子系统 ===
    var trailParticles = [];

    // === 新增: 浮动文字系统 ===
    var floatingTexts = [];

    // === 新增: Boss烟雾发射计时 ===
    var bossSmokeTimer = 0;

    // === 新增: 屏幕白闪 ===
    var screenFlashAlpha = 0;
    var screenFlashColor = '#FFFFFF';

    function triggerShake(intensity) {
      screenShake.intensity = intensity;
      screenShake.timer = 0.15; // 150ms shake duration
    }

    function updateScreenShake(dt) {
      if (screenShake.timer <= 0) {
        screenShake.offsetX = 0;
        screenShake.offsetY = 0;
        return;
      }
      screenShake.timer -= dt / 60;
      var t = screenShake.timer / 0.15; // normalized 0-1
      var decay = t * t; // quadratic decay
      var ix = screenShake.intensity * decay;
      screenShake.offsetX = (Math.random() - 0.5) * ix * 2;
      screenShake.offsetY = (Math.random() - 0.5) * ix * 2;
    }

    var startBtn = document.getElementById('start-btn');
    var startScreen = document.getElementById('start-screen');
    var gameOverScreen = document.getElementById('game-over');
    var scoreEl = document.getElementById('score');
    var comboEl = document.getElementById('combo');
    var timerEl = document.getElementById('timer');
    var phaseEl = document.getElementById('phase');
    var versionEl = document.getElementById('version');
    var notifEl = document.getElementById('powerup-notification');

    function setVersion(msg) {
      if (versionEl) versionEl.textContent = msg;
    }

    // === 新增: 分数弹跳 ===
    function bumpScore() {
      if (!scoreEl) return;
      scoreEl.classList.remove('bump');
      void scoreEl.offsetWidth; // 强制回流
      scoreEl.classList.add('bump');
      setTimeout(function() { scoreEl.classList.remove('bump'); }, 250);
    }

    // === 新增: 浮动文字 ===
    function addFloatingText(x, y, text, color, fontSize) {
      floatingTexts.push({
        x: x, y: y, text: text, color: color || '#FFD700',
        fontSize: fontSize || 24, life: 1.0, maxLife: 1.0
      });
    }

    // === 新增: 道具收集通知 ===
    function showPowerUpNotification(emoji, name) {
      if (!notifEl) return;
      notifEl.textContent = emoji + ' ' + name + ' 激活!';
      notifEl.style.color = '#FFD700';
      notifEl.classList.remove('show');
      void notifEl.offsetWidth;
      notifEl.classList.add('show');
      setTimeout(function() { notifEl.classList.remove('show'); }, 1300);
    }

    // === 新增: 屏幕闪光 ===
    function triggerScreenFlash(alpha, color) {
      screenFlashAlpha = alpha;
      screenFlashColor = color || '#FFFFFF';
    }

    function resize() {
      var dpr = window.devicePixelRatio || 1;
      W = window.innerWidth;
      H = window.innerHeight;
      bgCanvas.width = W * dpr;
      bgCanvas.height = H * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      SCALE = Math.min(W / 375, 1.1);
      if (app) app.renderer.resize(W, H);
      initStars(); // 重新生成星星
    }
    window.addEventListener('resize', resize);
    resize();

    var CONFIG = {
      gameDuration: 45,
      spawnRate: { base: 1.2, max: 4.0, curve: 1.8 },
      maxOnScreen: 12,
      types: { start: 3, max: 6, increaseAt: [0.25, 0.5, 0.75] },
      tapScore: 15,
      comboMultiplier: 0.3,
      maxCombo: 10,
      missLimit: 8,
      threatSpeed: { base: 0.010, variance: 0.004 },
      powerUpSpawnRate: 12,
      powerUpDuration: 10,
      bossSpawnTime: 30,
      phaseDuration: 15
    };
    var THREAT_TYPES = [
      { emoji: '🚀', color: '#FF2200', name: '火箭' },
      { emoji: '💣', color: '#FF6600', name: '炸弹' },
      { emoji: '☄️', color: '#FFAA00', name: '陨石' },
      { emoji: '🛸', color: '#00CCFF', name: 'UFO' },
      { emoji: '👾', color: '#AA44FF', name: '外星人' },
      { emoji: '🌑', color: '#888888', name: '暗黑' }
    ];
    var POWER_UP_TYPES = [
      { emoji: '🛡️', name: '护盾', color: '#00AAFF', effect: 'shield' },
      { emoji: '⏱️', name: '时间冻结', color: '#00FFCC', effect: 'freeze' },
      { emoji: '💥', name: '全屏清除', color: '#FFD700', effect: 'clear' }
    ];
    var PALETTE = { building: '#1a1218', buildingLight: '#2a2028' };

    // === 星空系统 ===
    function initStars() {
      stars = [];
      for (var i = 0; i < STAR_COUNT; i++) {
        stars.push({
          x: Math.random() * W,
          y: Math.random() * H,
          size: 0.5 + Math.random() * 2.0,
          speed: 0.15 + Math.random() * 0.35,
          twinkleSpeed: 0.5 + Math.random() * 3.0,
          twinkleOffset: Math.random() * Math.PI * 2,
          baseAlpha: 0.3 + Math.random() * 0.7
        });
      }
    }

    function updateStars(dt) {
      var dtS = dt / 60;
      for (var i = 0; i < stars.length; i++) {
        var s = stars[i];
        s.y += s.speed * dtS * 30;
        if (s.y > H + 5) { s.y = -5; s.x = Math.random() * W; }
      }
    }

    function drawStars(c) {
      var t = gameTime || 0;
      for (var i = 0; i < stars.length; i++) {
        var s = stars[i];
        var twinkle = 0.5 + 0.5 * Math.sin(t * s.twinkleSpeed + s.twinkleOffset);
        var alpha = s.baseAlpha * twinkle;
        c.fillStyle = 'rgba(255, 255, 255, ' + alpha + ')';
        c.beginPath();
        c.arc(s.x, s.y, s.size * SCALE, 0, Math.PI * 2);
        c.fill();
      }
    }

    // === 拖尾粒子系统 ===
    function addTrailParticle(x, y, color) {
      if (trailParticles.length > 300) return; // 限制总数
      trailParticles.push({
        x: x + (Math.random() - 0.5) * 6,
        y: y + (Math.random() - 0.5) * 6,
        size: 1.5 + Math.random() * 3,
        life: 0.3 + Math.random() * 0.2,
        maxLife: 0.3 + Math.random() * 0.2,
        color: color,
        vy: 0.5 + Math.random() * 1.0
      });
    }

    function updateTrailParticles(dt) {
      var dtS = dt / 60;
      for (var i = trailParticles.length - 1; i >= 0; i--) {
        var p = trailParticles[i];
        p.life -= dtS;
        p.y += p.vy * dtS * 20;
        if (p.life <= 0) {
          trailParticles.splice(i, 1);
        }
      }
    }

    function drawTrailParticles(c) {
      for (var i = 0; i < trailParticles.length; i++) {
        var p = trailParticles[i];
        var alpha = (p.life / p.maxLife) * 0.6;
        var size = p.size * (p.life / p.maxLife) * SCALE;
        var rgb = hexToRgb(p.color);
        c.fillStyle = 'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',' + alpha + ')';
        c.beginPath();
        c.arc(p.x, p.y, size, 0, Math.PI * 2);
        c.fill();
      }
    }

    // === 浮动文字更新和渲染 ===
    function updateFloatingTexts(dt) {
      var dtS = dt / 60;
      for (var i = floatingTexts.length - 1; i >= 0; i--) {
        var ft = floatingTexts[i];
        ft.life -= dtS;
        ft.y -= 1.5 * dtS * 60;
        if (ft.life <= 0) {
          floatingTexts.splice(i, 1);
        }
      }
    }

    function drawFloatingTexts(c) {
      for (var i = 0; i < floatingTexts.length; i++) {
        var ft = floatingTexts[i];
        var alpha = Math.max(0, ft.life / ft.maxLife);
        var size = ft.fontSize * SCALE * (1 + (1 - alpha) * 0.3);
        c.save();
        c.globalAlpha = alpha;
        c.fillStyle = ft.color;
        c.font = 'bold ' + size + 'px sans-serif';
        c.textAlign = 'center';
        c.textBaseline = 'middle';
        c.shadowColor = ft.color;
        c.shadowBlur = 10;
        c.fillText(ft.text, ft.x, ft.y);
        c.restore();
      }
    }

    // 预设系统变量（在 try 外部声明，确保函数可访问）
    var texCache = {};
    var _effects = [];
    var _presetSprites = [];

    if (typeof PIXI !== 'undefined') {
      try {
        app = new PIXI.Application({
          width: W, height: H,
          resolution: window.devicePixelRatio || 1,
          autoDensity: true,
          backgroundAlpha: 0, antialias: true
        });
        document.getElementById('pixi-container').appendChild(app.view);
        setVersion('PixiJS Ready');

        function makeTex(r, g, b) {
          var c = document.createElement('canvas');
          c.width = 64; c.height = 64;
          var x = c.getContext('2d');
          var grad = x.createRadialGradient(32, 32, 0, 32, 32, 32);
          grad.addColorStop(0, 'rgba(255,255,255,1)');
          grad.addColorStop(0.2, 'rgba(' + r + ',' + g + ',' + b + ',0.95)');
          grad.addColorStop(0.6, 'rgba(' + r + ',' + g + ',' + b + ',0.5)');
          grad.addColorStop(1, 'rgba(' + r + ',' + g + ',' + b + ',0)');
          x.fillStyle = grad; x.fillRect(0, 0, 64, 64);
          return PIXI.Texture.from(c);
        }
        particleTextures.fire = makeTex(255, 100, 30);
        particleTextures.spark = makeTex(255, 255, 200);
        particleTextures.smoke = makeTex(80, 80, 80);
        particleTextures.debris = makeTex(200, 50, 0);

        // 纹理缓存和效果数组已在 try 外部声明

        // 冲击波预设配置
        var SHOCKWAVE_PRESET = {
          name: "冲击波",
          flash: { color: 0xFFFFFF, size: 15, alpha: 0.8, duration: 60 },
          fireballs: [
            { color: 0xFFCC55, maxR: 28, life: 0.35, delay: 0 }
          ],
          rings: [
            { color: 0xFFAA44, maxR: 60, lineWidth: 4, life: 0.25, delay: 0 },
            { color: 0xFF6622, maxR: 80, lineWidth: 2.5, life: 0.30, delay: 50 },
            { color: 0xFF4400, maxR: 100, lineWidth: 1.5, life: 0.35, delay: 100 }
          ],
          debrisCount: 25,
          debrisColors: [0xFF6622, 0xCC4411, 0x993300],
          debrisSpeed: { min: 50, max: 120 },
          debrisLife: { min: 0.3, max: 0.6 },
          debrisSize: { min: 3, max: 6 },
          debrisSharpness: 0.05,
          sparkCount: 20,
          sparkColors: [0xFFDD88, 0xFFCC44],
          sparkSpeed: { min: 70, max: 140 },
          sparkLife: { min: 0.2, max: 0.4 },
          sparkSize: { min: 2, max: 4 },
          sparkSharpness: 0.02,
          launchOffset: 5,
          debrisGravity: 0.15,
          sparkGravity: 0.1
        };

        function makePresetTex(r, g, b, sharpness) {
          var key = r + '_' + g + '_' + b + '_' + (sharpness || 0.15);
          if (!texCache[key]) {
            var c = document.createElement('canvas');
            var size = Math.round(48 + (sharpness || 0.15) * 48);
            c.width = size; c.height = size;
            var tctx = c.getContext('2d');
            var half = size / 2;
            var s = sharpness || 0.15;
            var grad = tctx.createRadialGradient(half, half, 0, half, half, half);
            grad.addColorStop(0, 'rgba(255,255,255,1)');
            grad.addColorStop(s * 0.5, 'rgba(' + r + ',' + g + ',' + b + ',0.95)');
            grad.addColorStop(Math.min(0.6, s * 2), 'rgba(' + r + ',' + g + ',' + b + ',0.3)');
            grad.addColorStop(1, 'rgba(' + r + ',' + g + ',' + b + ',0)');
            tctx.fillStyle = grad;
            tctx.fillRect(0, 0, size, size);
            texCache[key] = PIXI.Texture.from(c);
          }
          return texCache[key];
        }

        // 根据基础颜色生成爆炸色板（亮色->基色->暗色）
        function generateExplosionColors(baseHex) {
          var c = hexToRgb(baseHex);
          var bright = rgbToHex(
            Math.min(255, c.r + 80),
            Math.min(255, c.g + 80),
            Math.min(255, c.b + 80)
          );
          var dark = rgbToHex(
            Math.max(0, Math.floor(c.r * 0.5)),
            Math.max(0, Math.floor(c.g * 0.5)),
            Math.max(0, Math.floor(c.b * 0.5))
          );
          return {
            base: rgbToHex(c.r, c.g, c.b),
            bright: bright,
            dark: dark,
            flash: 0xFFFFFF
          };
        }

        // === 预设驱动的爆炸发射 ===
        function emitPreset(x, y, colorHex) {
          var preset = SHOCKWAVE_PRESET;
          var S = SCALE;
          if (!app || !app.stage) return;

          // 动态生成色板
          var colors = generateExplosionColors(colorHex || preset.fireballs[0].color);

          // 闪光
          var flash = new PIXI.Graphics();
          flash.beginFill(colors.flash);
          flash.drawCircle(x, y, preset.flash.size * S);
          flash.alpha = preset.flash.alpha;
          app.stage.addChild(flash);
          setTimeout(function() {
            if (flash.parent) flash.parent.removeChild(flash);
            flash.destroy();
          }, preset.flash.duration);

          // 火球
          preset.fireballs.forEach(function(fb) {
            setTimeout(function() {
              var fbObj = {
                type: 'fireball', x: x, y: y, r: 3 * S,
                maxR: fb.maxR * S, color: colors.bright,
                life: fb.life, maxLife: fb.life,
                g: new PIXI.Graphics()
              };
              app.stage.addChild(fbObj.g);
              _effects.push(fbObj);
            }, fb.delay);
          });

          // 冲击波环 (2-3层，延迟错开)
          preset.rings.forEach(function(r) {
            setTimeout(function() {
              var ringObj = {
                type: 'ring', x: x, y: y, r: 3 * S,
                maxR: r.maxR * S, color: colors.base, lineWidth: r.lineWidth,
                life: r.life, maxLife: r.life,
                g: new PIXI.Graphics()
              };
              app.stage.addChild(ringObj.g);
              _effects.push(ringObj);
            }, r.delay);
          });

          // 碎片粒子（从边缘发射）
          for (var i = 0; i < preset.debrisCount; i++) {
            var a = Math.random() * Math.PI * 2;
            var sp = (preset.debrisSpeed.min + Math.random() * (preset.debrisSpeed.max - preset.debrisSpeed.min)) * S;
            var off = preset.launchOffset * S;
            var sx = x + Math.cos(a) * off;
            var sy = y + Math.sin(a) * off;
            var cols = [colors.bright, colors.base, colors.dark];
            var col = cols[Math.floor(Math.random() * cols.length)];
            var cr = (col >> 16) & 0xFF, cg = (col >> 8) & 0xFF, cb = col & 0xFF;
            var tex = makePresetTex(cr, cg, cb, preset.debrisSharpness);
            var life = preset.debrisLife.min + Math.random() * (preset.debrisLife.max - preset.debrisLife.min);
            var size = preset.debrisSize.min + Math.random() * (preset.debrisSize.max - preset.debrisSize.min);

            var sprite = new PIXI.Sprite(tex);
            sprite.anchor.set(0.5);
            sprite.x = sx; sprite.y = sy;
            sprite.blendMode = PIXI.BLEND_MODES.ADD;
            app.stage.addChild(sprite);

            _presetSprites.push({
              sprite: sprite, x: sx, y: sy,
              vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
              life: life, maxLife: life, size: size,
              gravity: preset.debrisGravity,
              rotation: Math.random() * Math.PI * 2,
              rotSpeed: (Math.random() - 0.5) * 10
            });
          }

          // 火花粒子
          for (var i = 0; i < preset.sparkCount; i++) {

    };

    function PowerUp(x, y, typeIdx) {
      this.x = x; this.y = y; this.typeIdx = typeIdx % 3;
      this.radius = 22 * SCALE;
      this.emoji = POWER_UP_TYPES[this.typeIdx].emoji;
      this.color = POWER_UP_TYPES[this.typeIdx].color;
      this.effect = POWER_UP_TYPES[this.typeIdx].effect;
      this.alive = true; this.time = 0;
      this.life = CONFIG.powerUpDuration; // 道具存活时间(秒)
      this.wobble = Math.random() * Math.PI * 2;
    }
    PowerUp.prototype.update = function(dt) {
      this.time += dt / 60;
      this.wobble += 0.05 * dt;
      this.y += 0.3 * SCALE * dt; // 缓慢下落
      if (this.time >= this.life) { this.alive = false; }
      return this.alive;
    };
    PowerUp.prototype.render = function(c) {
      var r = this.radius;
      // 呼吸闪烁 alpha在0.6-1.0之间
      var breathe = 0.6 + 0.4 * Math.sin(this.time * 3);
      var alpha = this.time > this.life - 2 ? Math.max(0, (this.life - this.time) / 2) * breathe : breathe;
      c.save(); c.globalAlpha = alpha;
      c.translate(this.x, this.y);
      // 旋转光环 (2-3层不同半径)
      var ringColors = [];
      if (this.effect === 'shield') {
        ringColors = ['#00AAFF', '#0088DD', '#0066BB'];
      } else if (this.effect === 'freeze') {
        ringColors = ['#00FFCC', '#00DDAA', '#00BB88'];
      } else {
        ringColors = ['#FFD700', '#FFAA00', '#FF8800'];
      }
      for (var ri = 0; ri < 3; ri++) {
        var ringR = r * (1.3 + ri * 0.35);
        var ringAlpha = (0.25 - ri * 0.07) * alpha;
        var rotAngle = this.time * (1.5 + ri * 0.8) + ri * 1.2;
        c.strokeStyle = ringColors[ri];
        c.lineWidth = (2 - ri * 0.4) * SCALE;
        c.globalAlpha = ringAlpha;
        c.beginPath();
        c.arc(0, 0, ringR * SCALE, rotAngle, rotAngle + Math.PI * 1.2);
        c.stroke();
        // 对面也画一段
        c.beginPath();
        c.arc(0, 0, ringR * SCALE, rotAngle + Math.PI, rotAngle + Math.PI * 1.5);
        c.stroke();
      }
      c.globalAlpha = alpha;
      // 发光背景
      c.fillStyle = this.color;
      c.globalAlpha = alpha * 0.3;
      c.beginPath(); c.arc(0, 0, r * 1.3, 0, Math.PI * 2); c.fill();
      c.globalAlpha = alpha * 0.6;
      c.beginPath(); c.arc(0, 0, r * 1.1, 0, Math.PI * 2); c.fill();
      c.globalAlpha = alpha;
      c.beginPath(); c.arc(0, 0, r, 0, Math.PI * 2); c.fill();
      // Emoji
      c.fillStyle = '#fff'; c.font = 'bold ' + (r * 1.2) + 'px sans-serif';
      c.textAlign = 'center'; c.textBaseline = 'middle';
      c.fillText(this.emoji, 0, r * 0.05);
      c.restore();
    };
    PowerUp.prototype.hitTest = function(x, y) {
      var dx = x - this.x, dy = y - this.y;
      return dx*dx + dy*dy < (this.radius + 10*SCALE)*(this.radius + 10*SCALE);
    };

    function drawBackground(c) {
      c.fillStyle = '#0a0510'; c.fillRect(0, 0, W, H);
      // 绘制星空
      drawStars(c);
      var bw = W * 0.75, bh = H * 0.14;
      var bx = (W - bw) / 2, by = H * 0.82;
      c.fillStyle = PALETTE.building; c.fillRect(bx, by, bw, bh);
      c.fillStyle = PALETTE.buildingLight; c.fillRect(bx + bw*0.05, by - bh*0.25, bw*0.9, bh*0.25);
      c.beginPath(); c.moveTo(bx + bw*0.02, by - bh*0.25); c.lineTo(W/2, by - bh*0.55); c.lineTo(bx + bw*0.98, by - bh*0.25); c.closePath(); c.fill();
      c.fillStyle = '#3a3a4a';
      for (var i = 0; i < 7; i++) c.fillRect(bx + bw*0.12 + i*bw*0.11, by - bh*0.2, bw*0.04, bh*0.45);
      c.fillStyle = '#FFD70033'; c.fillRect(bx + bw*0.42, by + bh*0.1, bw*0.16, bh*0.4);
      c.fillStyle = '#FF2200'; c.fillRect(W/2 - 2, by - bh*0.6, 4, 15);
    }

    function getDifficulty() {
      var p = Math.min(gameTime / CONFIG.gameDuration, 1);
      return CONFIG.spawnRate.base + Math.pow(p, CONFIG.spawnRate.curve) * (CONFIG.spawnRate.max - CONFIG.spawnRate.base);
    }
    function getActiveTypes() {
      var p = gameTime / CONFIG.gameDuration;
      var t = CONFIG.types.start;
      CONFIG.types.increaseAt.forEach(function(th) { if (p > th) t++; });
      return Math.min(t, CONFIG.types.max);
    }
    function spawnThreat() {
      if (threats.filter(function(t) { return t.alive; }).length >= CONFIG.maxOnScreen) return;
      var types = getActiveTypes();
      var type = Math.floor(Math.random() * types);
      var m = 40 * SCALE;
      threats.push(new Threat(m + Math.random()*(W - 2*m), -50, type, threatId++));
    }

    function spawnPowerUp() {
      var typeIdx = Math.floor(Math.random() * 3);
      var m = 60 * SCALE;
      var x = m + Math.random() * (W - 2 * m);
      var y = 40 * SCALE + Math.random() * (H * 0.3);
      powerUps.push(new PowerUp(x, y, typeIdx));
    }

    function spawnBoss() {
      if (bossSpawned) return;
      bossSpawned = true;
      var m = 40 * SCALE;
      var boss = new Threat(W / 2, -80, 0, threatId++);
      boss.isBoss = true;
      boss.hp = 3; boss.maxHp = 3;
      boss.radius = 35 * SCALE;
      boss.speed = CONFIG.threatSpeed.base * 0.4 * SCALE; // 更慢
      boss.targetY = H * 0.35;
      boss.color = '#FF0044';
      boss.emoji = '👹';
      threats.push(boss);
    }

    function collectPowerUp(pu) {
      var type = pu.effect;
      var puInfo = POWER_UP_TYPES[pu.typeIdx];
      if (type === 'shield') {
        shieldActive = true;
        score += 5;
        scoreEl.textContent = score;
        bumpScore();
        showPowerUpNotification('🛡️', '护盾');
        addFloatingText(pu.x, pu.y - 30, '+5 🛡️', '#00AAFF', 20);
      } else if (type === 'freeze') {
        freezeActive = true;
        freezeTimer = 5; // 5秒冻结
        score += 10;
        scoreEl.textContent = score;
        bumpScore();
        showPowerUpNotification('❄️', '时间冻结');
        addFloatingText(pu.x, pu.y - 30, '+10 ❄️', '#00FFCC', 20);
      } else if (type === 'clear') {
        // 消灭所有当前存活的非Boss威胁
        for (var i = 0; i < threats.length; i++) {
          var t = threats[i];
          if (t.alive && !t.isBoss) {
            t.alive = false;
            combo++; if (combo > maxCombo) maxCombo = combo;
            var cm = 1 + Math.min(combo * CONFIG.comboMultiplier, CONFIG.maxCombo - 1);
            score += Math.round(CONFIG.tapScore * cm * 0.5);
            var pos = t.position();
            try { emitPreset(pos.x, pos.y, t.color); } catch(e) {}
          }
        }
        score += 50;
        scoreEl.textContent = score;
        bumpScore();
        try { showPowerUpNotification('💥', '全屏清除'); } catch(e) {}
        try { addFloatingText(W / 2, H / 2 - 50, '💥 CLEAR!', '#FFD700', 32); } catch(e) {}
        // 全屏闪光
        if (app) {
          var flash = new PIXI.Graphics(); flash.beginFill(0xFFFFFF);
          flash.drawRect(0, 0, W, H); flash.alpha = 0.6;
          app.stage.addChild(flash);
          setTimeout(function() { if(flash.parent) flash.parent.removeChild(flash); flash.destroy(); }, 100);
        }
        try { triggerShake(10); } catch(e) {}
      }
      scoreEl.textContent = score;
    }

    function handleTap(x, y) {
      if (!gameActive) return;
      // 先检查是否点击道具
      for (var i = powerUps.length - 1; i >= 0; i--) {
        var pu = powerUps[i]; if (!pu.alive) continue;
        if (pu.hitTest(x, y)) {
          pu.alive = false;
          collectPowerUp(pu);
          return;
        }
      }
      // 检查是否点击威胁
      for (var i = threats.length - 1; i >= 0; i--) {
        var t = threats[i]; if (!t.alive) continue;
        if (t.hitTest(x, y)) {
          if (t.isBoss && t.hp > 1) {
            // Boss需要多次点击
            t.hp--;
            var pos = t.position();
            // 受击闪烁：Boss红色闪烁
            t.flash('#FF0044');
            try { emitPreset(pos.x, pos.y, t.color); } catch(e) {}
            try { triggerShake(8); } catch(e) {}
            if (t.hp <= 0) {
              t.alive = false;
              bossDefeated = true;
              combo += 3; if (combo > maxCombo) maxCombo = combo;
              var cm = 1 + Math.min(combo * CONFIG.comboMultiplier, CONFIG.maxCombo - 1);
              score += Math.round(CONFIG.tapScore * cm * 5); // Boss奖励5倍
              scoreEl.textContent = score;
              comboEl.textContent = combo >= 2 ? '🔥 ' + combo + '连击' : '';
              bumpScore();
              try { emitBossExplosion(pos.x, pos.y); } catch(e) {}
              try { addFloatingText(pos.x, pos.y - 40, '👹 BOSS ELIMINATED!', '#FF0044', 28); } catch(e) {}
            }
            return;
          }
          // 普通威胁受击闪烁白色
          t.flash('#FFFFFF');
          t.alive = false;
          combo++; if (combo > maxCombo) maxCombo = combo;
          var cm = 1 + Math.min(combo * CONFIG.comboMultiplier, CONFIG.maxCombo - 1);
          score += Math.round(CONFIG.tapScore * cm);
          // 先更新UI，再执行特效（防止特效报错阻断分数显示）
          scoreEl.textContent = score;
          comboEl.textContent = combo >= 2 ? '🔥 ' + combo + '连击' : '';
          bumpScore();
          var pos = t.position();
          try { emitPreset(pos.x, pos.y, t.color); } catch(e) {}
          try { triggerShake(6 + Math.min(combo, 10)); } catch(e) {}
          // 连击浮动文字
          if (combo >= 3) {
            try { addFloatingText(pos.x, pos.y - 20, combo + ' COMBO!', '#FFD700', 22); } catch(e) {}
          }
          return;
        }
      }
      combo = 0; comboEl.textContent = '';
      // 空点击反馈：小火花 + 轻微震动
      triggerShake(2);
      emitEmptySpark(x, y);
    }

    // 空点击火花效果
    function emitEmptySpark(x, y) {
      if (!app) return;
      for (var i = 0; i < 6; i++) {
        var a = Math.random() * Math.PI * 2;
        var sp = 30 + Math.random() * 60;
        emitParticle(x, y, Math.cos(a) * sp, Math.sin(a) * sp, 0.2 + Math.random() * 0.15, 'spark', 1 + Math.random());
      }
    }

    function gameOver() {
      gameActive = false;
      // 保存最高分到 localStorage
      try {
        var saved = localStorage.getItem('whitehouse_defense_highscore');
        var prevHigh = saved ? parseInt(saved, 10) : 0;
        if (score > prevHigh) {
          highScore = score;
          localStorage.setItem('whitehouse_defense_highscore', score.toString());
        } else {
          highScore = prevHigh;
        }
      } catch(e) {}
      var r = score > 2000 ? '⭐ 优秀' : score > 1000 ? '👍 合格' : '💪 加油';
      document.getElementById('final-score').textContent = score;
      document.getElementById('final-combo').textContent = maxCombo;
      document.getElementById('go-rating').textContent = r;
      document.getElementById('go-title').textContent = score > 1000 ? '🛡️ 完成!' : '⚠️ 失败!';
      document.getElementById('high-score').textContent = highScore;
      gameOverScreen.style.display = 'block';
    }

    function restartGame() {
      gameActive = true;
      startScreen.style.display = 'none';
      gameOverScreen.style.display = 'none';
      score = 0; combo = 0; maxCombo = 0; missed = 0;
      gameTime = 0; threats = [];
      powerUps = []; powerUpSpawnTimer = 0;
      shieldActive = false; freezeActive = false; freezeTimer = 0;
      bossSpawned = false; bossDefeated = false;
      // 加载最高分
      try {
        var saved = localStorage.getItem('whitehouse_defense_highscore');
        highScore = saved ? parseInt(saved, 10) : 0;
      } catch(e) { highScore = 0; }
      if (app && particles) {
        while(particles.length) {
          var p = particles.pop();
          if (p.sprite && p.sprite.parent) p.sprite.parent.removeChild(p.sprite);
          if (p.sprite) p.sprite.destroy();
        }
        while(explosions.length) {
          var e = explosions.pop();
          if (e.g) { if(e.g.parent) e.g.parent.removeChild(e.g); e.g.destroy(); }
        }
        // 清理预设系统效果
        while(_effects.length) {
          var e = _effects.pop();
          if (e.g && e.g.parent) e.g.parent.removeChild(e.g);
          if (e.g) e.g.destroy();
        }
        while(_presetSprites.length) {
          var s = _presetSprites.pop();
          if (s.sprite && s.sprite.parent) s.sprite.parent.removeChild(s.sprite);
          if (s.sprite) s.sprite.destroy();
        }
      }
      // 清理新增系统
      trailParticles = [];
      floatingTexts = [];
      bossSmokeTimer = 0;
      screenFlashAlpha = 0;
      threatId = 0; spawnTimer = 0;
      scoreEl.textContent = '0'; comboEl.textContent = '';
    }

    startBtn.addEventListener('click', function(e) {
      e.preventDefault(); e.stopPropagation();
      gameStarted = true; restartGame();
    });
    startBtn.addEventListener('touchend', function(e) {
      e.preventDefault(); e.stopPropagation();
      gameStarted = true; restartGame();
    });

    bgCanvas.addEventListener('touchstart', function(e) {
      e.preventDefault();
      if (!gameStarted) return;
      if (!gameActive) { restartGame(); return; }
      var t = e.touches[0];
      handleTap(t.clientX, t.clientY);
    }, { passive: false });

    bgCanvas.addEventListener('mousedown', function(e) {
      if (!gameStarted) return;
      if (!gameActive) { restartGame(); return; }
      handleTap(e.clientX, e.clientY);
    });

    var lastTime = 0;
    function loop(ts) {
      var dt = Math.min((ts - lastTime) / 16.67, 3);
      lastTime = ts;

      if (gameActive) {
        gameTime += dt / 60;
        spawnTimer += dt / 60;
        if (spawnTimer >= 1 / getDifficulty() && gameTime > 0.5) {
          spawnThreat(); spawnTimer = 0;
        }
        // 道具生成
        powerUpSpawnTimer += dt / 60;
        if (powerUpSpawnTimer >= CONFIG.powerUpSpawnRate && powerUps.filter(function(p) { return p.alive; }).length < 2) {
          spawnPowerUp(); powerUpSpawnTimer = 0;
        }
        // Boss生成
        if (gameTime >= CONFIG.bossSpawnTime && !bossSpawned) {
          spawnBoss();
        }
        // 冻结倒计时
        if (freezeActive) {
          freezeTimer -= dt / 60;
          if (freezeTimer <= 0) { freezeActive = false; freezeTimer = 0; }
        }
        // Boss烟雾发射
        if (bossSpawned && !bossDefeated) {
          bossSmokeTimer += dt;
          if (bossSmokeTimer >= 3) { // 每3帧发射一次
            bossSmokeTimer = 0;
            for (var bi = 0; bi < threats.length; bi++) {
              var bt = threats[bi];
              if (bt.alive && bt.isBoss) {
                var bpos = bt.position();
                emitParticle(bpos.x + (Math.random() - 0.5) * bt.radius * 1.5, bpos.y + (Math.random() - 0.5) * bt.radius * 1.5,
                  (Math.random() - 0.5) * 0.5, -0.8 - Math.random() * 0.5,
                  0.8 + Math.random() * 0.4, 'smoke', 4 + Math.random() * 5);
              }
            }
          }
        }
        // 更新道具
        for (var i = powerUps.length - 1; i >= 0; i--) {
          if (!powerUps[i].alive) { powerUps.splice(i, 1); continue; }
          powerUps[i].update(dt);
          if (!powerUps[i].alive) powerUps.splice(i, 1);
        }
        for (var i = 0; i < threats.length; i++) {
          var t = threats[i];
          if (!t.alive) continue;
          if (t.update(dt) && Math.random() < 0.02 * dt) {
            t.alive = false; missed++; combo = 0;
            comboEl.textContent = '';
            // 护盾抵挡一次漏掉惩罚
            if (shieldActive) {
              shieldActive = false;
              missed--;
            } else {
              // 修复：调用落地爆炸效果
              var pos = t.position();
              emitFailExplosion(pos.x, pos.y);
            }
            if (missed >= CONFIG.missLimit) gameOver();
          }
        }
        threats = threats.filter(function(t) { return t.alive; });
        var rem = Math.max(0, CONFIG.gameDuration - gameTime);
        timerEl.textContent = '⏱️ ' + Math.ceil(rem) + 's';
        // 关卡阶段显示
        if (phaseEl) {
          var phaseNum = Math.min(3, Math.floor(gameTime / CONFIG.phaseDuration) + 1);
          var phaseNames = ['', '🟢 第一阶段', '🟡 第二阶段', '🔴 最终阶段'];
          var phaseText = phaseNames[phaseNum] || '';
          if (bossSpawned && !bossDefeated) phaseText += ' ⚠️ BOSS';
          if (shieldActive) phaseText += ' 🛡️';
          if (freezeActive) phaseText += ' ❄️';
          phaseEl.textContent = phaseText;
        }
        if (rem <= 0) gameOver();
      }

      if (app) {
        for (var i = particles.length - 1; i >= 0; i--) {
          if (!particles[i].update(dt)) particles.splice(i, 1);
        }
        // 更新爆炸特效对象（旧版兼容 + 预设系统）
        for (var i = explosions.length - 1; i >= 0; i--) {
          if (!explosions[i].update(dt)) explosions.splice(i, 1);
        }
        // 更新预设爆炸效果
        updateEffects(dt);
        updatePresetSprites(dt);
        // 屏幕震动效果
        updateScreenShake(dt);
        app.stage.position.set(screenShake.offsetX, screenShake.offsetY);
      }

      // 更新星空
      updateStars(dt);
      // 更新拖尾粒子
      updateTrailParticles(dt);
      // 更新浮动文字
      updateFloatingTexts(dt);
      // 更新屏幕闪
      if (screenFlashAlpha > 0) {
        screenFlashAlpha -= dt / 60 * 4; // 250ms淡出
        if (screenFlashAlpha < 0) screenFlashAlpha = 0;
      }

      ctx.save();
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
      ctx.setTransform(window.devicePixelRatio || 1, 0, 0, window.devicePixelRatio || 1, 0, 0);
      // 应用屏幕震动偏移
      if (screenShake.offsetX || screenShake.offsetY) {
        ctx.translate(screenShake.offsetX, screenShake.offsetY);
      }
      drawBackground(ctx);
      // 绘制拖尾粒子（在威胁下方）
      drawTrailParticles(ctx);
      for (var i = 0; i < threats.length; i++) {
        if (threats[i].alive) threats[i].render(ctx);
      }
      // 渲染道具
      for (var i = 0; i < powerUps.length; i++) {
        if (powerUps[i].alive) powerUps[i].render(ctx);
      }
      // 绘制浮动文字
      drawFloatingTexts(ctx);
      // 绘制屏幕闪光
      if (screenFlashAlpha > 0) {
        ctx.save();
        ctx.globalAlpha = screenFlashAlpha;
        ctx.fillStyle = screenFlashColor;
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
      }
      ctx.restore();

      requestAnimationFrame(loop);
    }

    setVersion('v5.6.1 - Score Fix');
    requestAnimationFrame(loop);
  })();
  </script>
