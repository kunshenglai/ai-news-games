<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>白宫保卫战 - WebGL 粒子增强版</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #050208; touch-action: none; font-family: -apple-system, sans-serif; }
    canvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    
    /* WebGL Canvas 叠加在 2D Canvas 之上 */
    #particle-gl { z-index: 2; pointer-events: none; }
    #bg-canvas { z-index: 1; }

    #ui { position: absolute; top: 0; left: 0; right: 0; padding: max(16px, env(safe-area-inset-top)) 16px 8px 16px;
      display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; z-index: 10; color: #fff; }
    #title-area { max-width: 60%; }
    #title { color: #FFD700; font-size: 18px; font-weight: 900; text-shadow: 0 0 15px #FF4400, 2px 2px 4px #000; letter-spacing: 1px; }
    #subtitle { color: #FF8800; font-size: 12px; margin-top: 4px; }
    
    #score-panel { text-align: right; display: flex; flex-direction: column; align-items: flex-end; }
    #score { font-size: 30px; font-weight: 900; text-shadow: 0 0 20px #FF4400; background: rgba(0,0,0,0.4); padding: 2px 10px; border-radius: 6px; border: 1px solid #FF440066; }
    #combo { font-size: 15px; color: #FFD700; min-height: 20px; font-weight: bold; text-shadow: 0 0 10px #FFD700; }
    #timer { font-size: 14px; color: #fff; margin-top: 6px; font-weight: bold; background: #FF4400; padding: 3px 8px; border-radius: 6px; box-shadow: 0 0 15px #FF440088; }

    #news-bar { position: absolute; bottom: 0; left: 0; right: 0; padding: 8px 16px max(20px, env(safe-area-inset-bottom)) 16px;
      background: linear-gradient(transparent, rgba(0,0,0,0.95)); color: #aaa; font-size: 11px; pointer-events: none; text-align: center; }

    #game-over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
      text-align: center; color: #fff; display: none; z-index: 20; opacity: 0;
      background: linear-gradient(135deg, #1a0a15 0%, #0a0508 100%); width: 85%; max-width: 340px; padding: 28px 20px; border-radius: 24px; border: 2px solid #FF4400;
      box-shadow: 0 0 40px rgba(255, 68, 0, 0.5); transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    #game-over.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    #game-over h2 { color: #FF4400; font-size: 26px; margin-bottom: 20px; text-shadow: 0 0 10px #FF4400; }
    #game-over p { font-size: 17px; margin: 10px 0; color: #ddd; }
    #game-over p span { color: #FFD700; font-weight: bold; font-size: 20px; text-shadow: 0 0 8px #FFD700; }
    #game-over .hint { color: #FF8800; font-size: 14px; margin-top: 28px; animation: pulse 1.5s infinite; }

    #start-screen { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 25; background: radial-gradient(circle at 50% 30%, #1a0a15 0%, #050208 100%); padding: 40px 24px; transition: opacity 0.5s; }
    #start-screen h1 { color: #FF4400; font-size: 34px; margin-bottom: 16px; text-shadow: 0 0 30px #FF4400; text-align: center; animation: titleGlow 2s infinite alternate; }
    #start-screen .news { color: #FF8800; font-size: 16px; text-align: center; margin-bottom: 40px; line-height: 1.6; max-width: 90%; font-weight: bold; background: rgba(255, 68, 0, 0.1); padding: 10px 16px; border-radius: 8px; border: 1px solid #FF440044; }
    #start-screen .desc { color: #bbb; font-size: 15px; margin-bottom: 50px; text-align: center; }
    #start-screen .start-btn { color: #0a0508; background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
      font-size: 22px; font-weight: 900; padding: 16px 64px; border-radius: 44px; border: none; cursor: pointer; animation: pulse 1.5s infinite; box-shadow: 0 6px 25px rgba(255, 215, 0, 0.6); }

    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.06); } }
    @keyframes titleGlow { from { text-shadow: 0 0 30px #FF4400; } to { text-shadow: 0 0 50px #FF4400, 0 0 80px #FF440066; } }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <canvas id="particle-gl"></canvas>
  <div id="ui">
    <div id="title-area"><div id="title">🏛️ 白宫保卫战</div><div id="subtitle">消除威胁，保护安全</div></div>
    <div id="score-panel"><div id="score">0</div><div id="combo"></div><div id="timer">⏱️ 45s</div></div>
  </div>
  <div id="news-bar">📰 热点: 特朗普在白宫晚宴遭枪击 | 点击消除红色威胁物</div>
  <div id="game-over">
    <h2 id="go-title">任务结束</h2>
    <p>最终得分: <span id="final-score">0</span></p>
    <p>最高连击: <span id="final-combo">0</span></p>
    <p id="go-rating"></p>
    <p class="hint">点击屏幕任意位置重新开始</p>
  </div>
  <div id="start-screen">
    <h1>🏛️ 白宫保卫战</h1>
    <div class="news">📰 突发新闻: 特朗普在白宫晚宴遭枪击</div>
    <div class="desc">特工，请点击红色威胁物，保护白宫安全！</div>
    <div class="start-btn" id="start-btn">立即行动</div>
  </div>

  <script>
  (() => {
    'use strict';

    // === WebGL 粒子引擎 ===
    const glCanvas = document.getElementById('particle-gl');
    const gl = glCanvas.getContext('webgl', { alpha: true, premultipliedAlpha: false, antialias: false, depth: false });
    
    if (gl) {
      const vsSource = `
        attribute vec2 aPos;
        attribute float aSize;
        attribute vec4 aColor;
        uniform vec2 uRes;
        varying vec4 vColor;
        void main() {
          vec2 pos = (aPos / uRes) * 2.0 - 1.0;
          pos.y = -pos.y;
          gl_Position = vec4(pos, 0.0, 1.0);
          gl_PointSize = aSize;
          vColor = aColor;
        }
      `;

      const fsSource = `
        precision mediump float;
        varying vec4 vColor;
        void main() {
          vec2 coord = gl_PointCoord - 0.5;
          float d = length(coord);
          if (d > 0.5) discard;
          float alpha = smoothstep(0.5, 0.1, d);
          // 发光核心
          float core = smoothstep(0.15, 0.0, d) * 0.6;
          gl_FragColor = vec4(vColor.rgb * (1.0 + core), vColor.a * alpha);
        }
      `;

      const compileShader = (src, type) => {
        const s = gl.createShader(type);
        gl.shaderSource(s, src); gl.compileShader(s);
        if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) { console.error(gl.getShaderInfoLog(s)); return null; }
        return s;
      };

      const vs = compileShader(vsSource, gl.VERTEX_SHADER);
      const fs = compileShader(fsSource, gl.FRAGMENT_SHADER);
      const program = gl.createProgram();
      gl.attachShader(program, vs); gl.attachShader(program, fs);
      gl.linkProgram(program);
      gl.useProgram(program);

      const aPos = gl.getAttribLocation(program, 'aPos');
      const aSize = gl.getAttribLocation(program, 'aSize');
      const aColor = gl.getAttribLocation(program, 'aColor');
      const uRes = gl.getUniformLocation(program, 'uRes');

      // 数据缓冲区 (最大支持 10 万粒子)
      const MAX_PARTICLES = 100000;
      const posData = new Float32Array(MAX_PARTICLES * 2);
      const sizeData = new Float32Array(MAX_PARTICLES);
      const colorData = new Float32Array(MAX_PARTICLES * 4);

      const posBuf = gl.createBuffer(); const sizeBuf = gl.createBuffer(); const colorBuf = gl.createBuffer();

      const setGlSize = () => {
        glCanvas.width = window.innerWidth; glCanvas.height = window.innerHeight;
        gl.viewport(0, 0, glCanvas.width, glCanvas.height);
      };
      setGlSize(); window.addEventListener('resize', setGlSize);

      window.glParticles = { posData, sizeData, colorData, count: 0, MAX_PARTICLES, gl };
    } else { console.warn('WebGL not supported, falling back to simple 2D'); }

    // === 游戏基础 ===
    const bgCanvas = document.getElementById('bg-canvas');
    const ctx = bgCanvas.getContext('2d', { alpha: false });
    let W, H, SCALE;

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      W = window.innerWidth; H = window.innerHeight;
      bgCanvas.width = W * dpr; bgCanvas.height = H * dpr;
      ctx.scale(dpr, dpr);
      SCALE = Math.min(W / 375, 1.1);
      if (gl) { setGlSize(); gl.uniform2f(uRes, glCanvas.width, glCanvas.height); }
    }
    window.addEventListener('resize', resize);
    resize();

    const CONFIG = { gameDuration: 45, spawnRate: { base: 1.2, max: 4.0, curve: 1.8 }, maxOnScreen: 12,
      types: { start: 3, max: 6, increaseAt: [0.25, 0.5, 0.75] }, tapScore: 15, comboMultiplier: 0.3, maxCombo: 10,
      missLimit: 8, threatSpeed: { base: 0.010, variance: 0.004 } };
    const PALETTE = { bg: '#050208', primary: '#FF2200', secondary: '#FF6600', accent: '#FFD700',
      threat: ['#FF2200', '#FF4400', '#FF6600', '#CC0000', '#FF8800'], building: '#1a1218', buildingLight: '#2a2028' };

    // === WebGL 粒子管理器 ===
    const glParts = window.glParticles;
    let pCount = 0;
    const particles = []; // 逻辑列表，用于更新物理

    class Particle {
      constructor(x, y, vx, vy, life, color, size) {
        this.x = x; this.y = y; this.vx = vx; this.vy = vy;
        this.life = life; this.maxLife = life; this.color = color; this.size = size;
        this.active = true;
      }
      update(dt) {
        this.vy += 0.15 * dt; this.vx *= 0.99; this.vy *= 0.99;
        this.x += this.vx * dt; this.y += this.vy * dt;
        this.life -= dt;
        if (this.life <= 0) this.active = false;
        return this.active;
      }
    }

    function emitParticle(x, y, vx, vy, life, color, size) {
      particles.push(new Particle(x, y, vx, vy, life, color, size));
    }

    function updateParticles(dt) {
      let idx = 0;
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        if (p.update(dt)) {
          if (idx < glParts.MAX_PARTICLES) {
            glParts.posData[idx * 2] = p.x; glParts.posData[idx * 2 + 1] = p.y;
            glParts.sizeData[idx] = p.size * SCALE;
            glParts.colorData[idx * 4] = p.color[0]; glParts.colorData[idx * 4 + 1] = p.color[1];
            glParts.colorData[idx * 4 + 2] = p.color[2]; glParts.colorData[idx * 4 + 3] = Math.max(0, p.life / p.maxLife);
            idx++;
          }
        }
      }
      glParts.count = idx;
      // 清理死亡粒子（简单清理）
      if (particles.length > 2000) particles.splice(0, particles.length - 1000);
    }

    function renderParticles() {
      if (gl && glParts.count > 0) {
        gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA, gl.ONE); // 叠加发光
        gl.disable(gl.DEPTH_TEST);

        gl.bindBuffer(gl.ARRAY_BUFFER, posBuf); gl.bufferData(gl.ARRAY_BUFFER, glParts.posData.subarray(0, glParts.count * 2), gl.DYNAMIC_DRAW);
        gl.enableVertexAttribArray(aPos); gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

        gl.bindBuffer(gl.ARRAY_BUFFER, sizeBuf); gl.bufferData(gl.ARRAY_BUFFER, glParts.sizeData.subarray(0, glParts.count), gl.DYNAMIC_DRAW);
        gl.enableVertexAttribArray(aSize); gl.vertexAttribPointer(aSize, 1, gl.FLOAT, false, 0, 0);

        gl.bindBuffer(gl.ARRAY_BUFFER, colorBuf); gl.bufferData(gl.ARRAY_BUFFER, glParts.colorData.subarray(0, glParts.count * 4), gl.DYNAMIC_DRAW);
        gl.enableVertexAttribArray(aColor); gl.vertexAttribPointer(aColor, 4, gl.FLOAT, false, 0, 0);

        gl.drawArrays(gl.POINTS, 0, glParts.count);
      }
    }

    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1, 3), 16) / 255;
      const g = parseInt(hex.slice(3, 5), 16) / 255;
      const b = parseInt(hex.slice(5, 7), 16) / 255;
      return [r, g, b, 1];
    }

    // 爆炸特效
    function emitExplosion(x, y, color, count = 40) {
      const rgb = hexToRgb(color);
      for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2; const sp = (2 + Math.random() * 8) * SCALE;
        emitParticle(x, y, Math.cos(a)*sp, Math.sin(a)*sp, 0.6 + Math.random()*0.4, [rgb[0], rgb[1], rgb[2], 1], 4 + Math.random()*6);
      }
      // 核心白光
      for (let i = 0; i < 20; i++) {
        const a = Math.random() * Math.PI * 2; const sp = (1 + Math.random() * 3) * SCALE;
        emitParticle(x, y, Math.cos(a)*sp, Math.sin(a)*sp, 0.3 + Math.random()*0.2, [1,1,1,1], 8 + Math.random()*4);
      }
      // 烟雾 (暗色)
      for (let i = 0; i < 10; i++) {
        emitParticle(x + (Math.random()-0.5)*20, y + (Math.random()-0.5)*20, (Math.random()-0.5), -1, 1.0, [0.2,0.15,0.15,1], 10 + Math.random()*5);
      }
    }

    function emitComboFirework(x, y, combo) {
      const colors = [[1,0.4,0.4], [1,0.85,0.2], [0.4,0.8,0.4], [0.3,0.6,1], [1,0.4,0.8]];
      for (let i = 0; i < 60 + combo * 10; i++) {
        const a = Math.random() * Math.PI * 2; const sp = (3 + Math.random() * 10) * SCALE;
        const c = colors[Math.floor(Math.random() * colors.length)];
        emitParticle(x, y, Math.cos(a)*sp, Math.sin(a)*sp - 2, 1.0, [c[0],c[1],c[2],1], 3 + Math.random()*5);
      }
    }

    function emitFailExplosion(x, y) {
      // 毁灭爆炸：更多粒子，更强烈的颜色
      for (let i = 0; i < 80; i++) {
        const a = Math.random() * Math.PI * 2; const sp = (1 + Math.random() * 6) * SCALE;
        emitParticle(x, y, Math.cos(a)*sp, Math.sin(a)*sp, 0.8, [1,0,0.2,1], 5 + Math.random()*6);
      }
      // 闪电模拟 (极快速度的白粒子)
      for (let i = 0; i < 30; i++) {
        const a = Math.random() * Math.PI * 2; const sp = (8 + Math.random() * 15) * SCALE;
        emitParticle(x, y, Math.cos(a)*sp, Math.sin(a)*sp, 0.2, [1,1,1,1], 3);
      }
      screenFlash.intensity = 1.0; screenFlash.color = 'rgba(255,0,34,0.6)'; screenFlash.duration = 0.3;
    }

    function emitRipple(x, y) {
      emitParticle(x, y, 0, 0, 0.2, [1,1,1,1], 10);
      emitParticle(x, y, 0, 0, 0.15, [1,1,1,1], 20);
    }

    // === 浮动文字 ===
    let floatingTexts = [];
    class FloatingText {
      constructor(x, y, text, color = '#fff', size = 16) {
        this.x = x; this.y = y; this.text = text; this.color = color;
        this.life = 1.0; this.size = size * SCALE; this.vx = (Math.random()-0.5)*0.5; this.vy = -3;
      }
      update(dt) { this.x += this.vx*dt; this.y += this.vy*dt; this.life -= 0.025*dt; return this.life > 0; }
      render(ctx) {
        ctx.save(); ctx.globalAlpha = this.life; ctx.fillStyle = this.color;
        ctx.font = `900 ${this.size}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.shadowColor = '#000'; ctx.shadowBlur = 6; ctx.fillText(this.text, this.x, this.y); ctx.restore();
      }
    }

    // === 威胁物 ===
    class Threat {
      constructor(x, y, type, id) {
        this.x = x; this.y = y; this.type = type % 6; this.id = id;
        this.radius = (18 + Math.random() * 8) * SCALE;
        this.targetX = x; this.targetY = H * 0.75 + Math.random() * (H * 0.15);
        this.progress = 0; this.speed = (CONFIG.threatSpeed.base + Math.random() * CONFIG.threatSpeed.variance) * SCALE;
        this.startX = x; this.startY = -50; this.wobble = Math.random() * Math.PI * 2;
        this.alive = true; this.time = Math.random() * 100;
        this.color = PALETTE.threat[this.type % PALETTE.threat.length];
      }
      update(dt) { this.progress += this.speed * dt; this.time += 0.08 * dt; this.wobble += 0.06 * dt;
        if (this.progress >= 1) { this.progress = 1; return true; } return false; }
      get position() { const t = this.progress; const e = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
        return { x: this.startX + (this.targetX-this.startX)*e + Math.sin(this.wobble)*6*SCALE,
                 y: this.startY + (this.targetY-this.startY)*e }; }
      render(ctx) { const p = this.position; const r = this.radius; const pulse = 0.7 + Math.sin(this.time*4)*0.3;
        ctx.save(); ctx.translate(p.x, p.y);
        ctx.fillStyle = '#0a0510'; ctx.shadowColor = this.color; ctx.shadowBlur = 15;
        ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0; ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(0, 0, r * 0.8, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000'; ctx.font = `bold ${r}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('⚠', 0, 1); ctx.restore(); }
      hitTest(x, y) { const p = this.position; const dx = x - p.x, dy = y - p.y; return dx*dx + dy*dy < (this.radius + 14*SCALE)**2; }
    }

    // === 游戏状态 ===
    let score = 0, combo = 0, maxCombo = 0, missed = 0;
    let gameTime = 0, gameActive = false, gameStarted = false;
    let threats = []; let threatId = 0; let spawnTimer = 0;
    let screenShake = { intensity: 0, timer: 0 };
    let screenFlash = { intensity: 0, color: '', duration: 0, timer: 0 };

    function drawBackground() {
      const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
      bgGrad.addColorStop(0, '#0a0510'); bgGrad.addColorStop(0.5, '#1a0a15'); bgGrad.addColorStop(1, '#2a0a08');
      ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, W, H);
      drawWhiteHouse();
    }

    function drawWhiteHouse() {
      const bw = W * 0.75, bh = H * 0.14; const bx = (W - bw) / 2, by = H * 0.82;
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(bx+5, by+5, bw, bh);
      ctx.fillStyle = PALETTE.building; ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = PALETTE.buildingLight; ctx.fillRect(bx + bw*0.05, by - bh*0.25, bw*0.9, bh*0.25);
      ctx.beginPath(); ctx.moveTo(bx + bw*0.02, by - bh*0.25); ctx.lineTo(W/2, by - bh*0.55); ctx.lineTo(bx + bw*0.98, by - bh*0.25); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#3a3a4a'; const colW = bw*0.04, colGap = bw*0.11;
      for (let i=0; i<7; i++) ctx.fillRect(bx + bw*0.12 + i*colGap, by - bh*0.2, colW, bh*0.45);
      ctx.fillStyle = '#FFD70033'; ctx.fillRect(bx + bw*0.42, by + bh*0.1, bw*0.16, bh*0.4);
      ctx.fillStyle = '#FFD70022';
      for (let i=0; i<5; i++) ctx.fillRect(bx + bw*0.15 + i*bw*0.14, by - bh*0.1, bw*0.08, bh*0.1);
      const wave = Math.sin(Date.now()*0.005)*2;
      ctx.fillStyle = '#FF2200'; ctx.fillRect(W/2 - 2, by - bh*0.6, 4, 15);
      ctx.fillStyle = '#FFD700'; ctx.fillRect(W/2 - 8, by - bh*0.6 + wave, 16, 10);
      ctx.restore();
    }

    function getDifficulty() { const p = Math.min(gameTime / CONFIG.gameDuration, 1); return CONFIG.spawnRate.base + Math.pow(p, CONFIG.spawnRate.curve) * (CONFIG.spawnRate.max - CONFIG.spawnRate.base); }
    function getActiveTypes() { const p = gameTime / CONFIG.gameDuration; let t = CONFIG.types.start; CONFIG.types.increaseAt.forEach(th => { if (p > th) t++; }); return Math.min(t, CONFIG.types.max); }
    function spawnThreat() { if (threats.filter(t => t.alive).length >= CONFIG.maxOnScreen) return;
      const types = getActiveTypes(); const type = Math.floor(Math.random() * types);
      const m = 40 * SCALE; threats.push(new Threat(m + Math.random()*(W - 2*m), -50, type, threatId++)); }

    function handleTap(x, y) { if (!gameActive) return; let hit = false; emitRipple(x, y);
      for (let i = threats.length - 1; i >= 0; i--) { const t = threats[i]; if (!t.alive) continue; if (t.hitTest(x, y)) { t.alive = false; hit = true;
        combo++; if (combo > maxCombo) maxCombo = combo; const cm = 1 + Math.min(combo * CONFIG.comboMultiplier, CONFIG.maxCombo - 1);
        const earned = Math.round(CONFIG.tapScore * cm); score += earned; const pos = t.position;
        emitExplosion(pos.x, pos.y, t.color, 50);
        floatingTexts.push(new FloatingText(pos.x, pos.y - 20, `+${earned}`, combo >= 3 ? '#FFD700' : '#fff', 16 + Math.min(combo,5)*2));
        if (combo >= 3) { emitComboFirework(pos.x, pos.y, combo); floatingTexts.push(new FloatingText(pos.x, pos.y - 50, `🔥 ${combo}连击!`, '#FF4400', 18));
          screenShake.intensity = Math.min(combo, 10); screenShake.timer = 0.25; }
        document.getElementById('combo').textContent = combo >= 2 ? `🔥 ${combo}连击` : ''; updateScore(); break; } }
      if (!hit) { combo = 0; document.getElementById('combo').textContent = ''; } }

    function updateScore() { document.getElementById('score').textContent = score; }
    function gameOver() { gameActive = false; const r = score > 3000 ? '🏆 传奇安保' : score > 2000 ? '⭐ 优秀特工' : score > 1000 ? '👍 合格守卫' : '💪 继续加油';
      document.getElementById('final-score').textContent = score; document.getElementById('final-combo').textContent = maxCombo;
      document.getElementById('go-rating').textContent = r; document.getElementById('go-title').textContent = score > 1500 ? '🛡️ 任务完成!' : '⚠️ 威胁突破!';
      const go = document.getElementById('game-over'); go.style.display = 'block'; setTimeout(() => go.classList.add('show'), 10); }
    function restart() { score = 0; combo = 0; maxCombo = 0; missed = 0; gameTime = 0; threats = []; particles.length = 0; floatingTexts = [];
      threatId = 0; spawnTimer = 0; gameActive = true; document.getElementById('score').textContent = '0'; document.getElementById('combo').textContent = '';
      document.getElementById('game-over').style.display = 'none'; document.getElementById('start-screen').style.display = 'none'; }
    function getEventPos(e) { const rect = bgCanvas.getBoundingClientRect(); return { x: (e.touches ? e.touches[0].clientX : e.clientX) - rect.left, y: (e.touches ? e.touches[0].clientY : e.clientY) - rect.top }; }

    bgCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); if (!gameStarted) return; if (!gameActive) { restart(); return; } handleTap(getEventPos(e).x, getEventPos(e).y); }, { passive: false });
    bgCanvas.addEventListener('mousedown', (e) => { if (!gameStarted) return; if (!gameActive) { restart(); return; } handleTap(getEventPos(e).x, getEventPos(e).y); });
    document.getElementById('start-btn').addEventListener('click', (e) => { e.stopPropagation(); gameStarted = true; restart(); });

    let lastTime = 0;
    function loop(ts) { const dt = Math.min((ts - lastTime) / 16.67, 3); lastTime = ts;
      if (gameActive) { gameTime += dt / 60; spawnTimer += dt / 60; if (spawnTimer >= 1 / getDifficulty() && gameTime > 0.5) { spawnThreat(); spawnTimer = 0; }
        threats.forEach(t => { if (!t.alive) return; if (t.update(dt) && Math.random() < 0.02 * dt) { t.alive = false; missed++; combo = 0;
          document.getElementById('combo').textContent = ''; emitFailExplosion(t.position.x, t.position.y);
          screenShake.intensity = 15; screenShake.timer = 0.4;
          floatingTexts.push(new FloatingText(t.position.x, t.position.y - 30, '💥 突破!', '#FF0044', 18));
          if (missed >= CONFIG.missLimit) gameOver(); } });
        threats = threats.filter(t => t.alive);
        const rem = Math.max(0, CONFIG.gameDuration - gameTime); document.getElementById('timer').textContent = `⏱️ ${Math.ceil(rem)}s`; if (rem <= 0) gameOver(); }

      updateParticles(dt); floatingTexts = floatingTexts.filter(f => f.update(dt));
      if (screenShake.timer > 0) screenShake.timer -= dt / 60;
      if (screenFlash.timer > 0) { screenFlash.timer -= dt / 60; screenFlash.intensity = screenFlash.timer / screenFlash.duration; } else { screenFlash.intensity = 0; }

      ctx.save();
      if (screenShake.timer > 0) { const s = screenShake.intensity * (screenShake.timer / 0.25); ctx.translate((Math.random()-0.5)*s, (Math.random()-0.5)*s); }
      drawBackground();
      threats.forEach(t => { if (t.alive) t.render(ctx); });
      renderParticles();
      floatingTexts.forEach(f => f.render(ctx));

      if (gameActive) { const mp = missed / CONFIG.missLimit; ctx.fillStyle = '#440000'; ctx.fillRect(16, H - 24, W - 32, 6);
        ctx.fillStyle = mp > 0.7 ? '#FF2200' : '#FF8800'; ctx.fillRect(16, H - 24, (W-32)*mp, 6);
        const tp = 1 - (gameTime / CONFIG.gameDuration); ctx.fillStyle = '#111'; ctx.fillRect(16, H - 32, W - 32, 4); ctx.fillStyle = '#4488FF'; ctx.fillRect(16, H - 32, (W-32)*tp, 4); }
      if (screenFlash.intensity > 0) { ctx.fillStyle = screenFlash.color.replace('0.6', (0.6 * screenFlash.intensity).toFixed(2)); ctx.fillRect(0, 0, W, H); }
      ctx.restore(); requestAnimationFrame(loop); }
    requestAnimationFrame(loop);
  })();
  </script>
